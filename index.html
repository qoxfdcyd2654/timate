<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #c5e88a 0%, #8dc63f 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .timate-container {
            width: 1200px;
            max-width: 95%;
            height: 90vh;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .sidebar {
            width: 320px;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(0, 0, 0, 0.08);
        }
        .sidebar-header {
            background: #8dc63f;
            padding: 20px;
            text-align: center;
        }
        .sidebar-header h2 { color: white; font-size: 26px; }
        .sidebar-header p { color: rgba(255,255,255,0.8); font-size: 12px; }
        .current-user {
            padding: 15px;
            background: white;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #eee;
            position: relative;
        }
        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #9b59b6;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }
        .user-info { flex: 1; }
        .user-name { font-weight: bold; color: #2c3e50; }
        .user-status { font-size: 12px; color: #2ecc71; }
        .user-phone { font-size: 10px; color: #999; margin-top: 2px; }
        .user-bio { font-size: 11px; color: #666; margin-top: 2px; font-style: italic; }
        .settings-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .settings-btn:hover { background: #f0f0f0; }
        .logout-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .logout-btn:hover { background: #f0f0f0; }
        .search-box { padding: 15px; border-bottom: 1px solid #eee; }
        .search-box input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }
        .search-box input:focus { border-color: #9b59b6; }
        .tabs {
            display: flex;
            border-bottom: 1px solid #eee;
            background: #f8f9fa;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            color: #666;
        }
        .tab.active {
            background: white;
            color: #9b59b6;
            border-bottom: 2px solid #9b59b6;
        }
        .contacts-list, .users-list {
            flex: 1;
            overflow-y: auto;
            background: white;
        }
        .contact-item, .user-item {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid #f5f5f5;
        }
        .contact-item:hover, .user-item:hover { background: #f8f9fa; }
        .contact-item.active {
            background: #f3e5f5;
            border-left: 3px solid #9b59b6;
        }
        .contact-avatar, .user-avatar-small {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }
        .contact-info, .user-info-small { flex: 1; }
        .contact-name { font-weight: 600; color: #2c3e50; }
        .contact-status { font-size: 11px; }
        .contact-status.online { color: #2ecc71; }
        .contact-status.offline { color: #999; }
        .contact-phone { font-size: 10px; color: #8dc63f; margin-top: 2px; }
        .contact-bio { font-size: 10px; color: #666; margin-top: 2px; }
        .call-buttons { display: flex; gap: 8px; margin-left: auto; }
        .call-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 6px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .call-btn:hover { background: #f0f0f0; }
        .add-btn {
            background: #9b59b6;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        .chat-header {
            padding: 15px 20px;
            background: white;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }
        .chat-header-info { flex: 1; }
        .chat-header-info h3 { color: #2c3e50; font-size: 18px; }
        .chat-header-info p { font-size: 12px; color: #2ecc71; }
        .chat-header-info .phone { font-size: 10px; color: #8dc63f; }
        .chat-header-info .bio { font-size: 11px; color: #666; margin-top: 4px; }
        .call-controls { display: flex; gap: 10px; margin-left: auto; }
        .call-controls button {
            background: #9b59b6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message { display: flex; }
        .message.out { justify-content: flex-end; }
        .message-bubble {
            max-width: 65%;
            padding: 10px 14px;
            border-radius: 18px;
        }
        .message.in .message-bubble {
            background: white;
            color: #2c3e50;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message.out .message-bubble {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message-text { word-wrap: break-word; font-size: 14px; }
        .message-time { font-size: 10px; margin-top: 5px; opacity: 0.7; text-align: right; }
        .input-area {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }
        .input-area input:focus { border-color: #9b59b6; }
        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }
        .login-screen {
            width: 450px;
            background: rgba(255,255,255,0.98);
            border-radius: 28px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .login-screen h1 { color: #8dc63f; margin-bottom: 8px; font-size: 32px; }
        .login-screen p { color: #666; margin-bottom: 25px; }
        .login-screen input, .login-screen select, .login-screen textarea {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }
        .login-screen input:focus, .login-screen select:focus, .login-screen textarea:focus { border-color: #9b59b6; }
        .login-screen input.error, .login-screen select.error { border-color: #e74c3c; background-color: #fff5f5; }
        .phone-row { display: flex; gap: 10px; margin: 10px 0; }
        .phone-row select { width: 35%; margin: 0; }
        .phone-row input { width: 65%; margin: 0; }
        .login-screen button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
        }
        .switch-mode { margin-top: 15px; color: #9b59b6; cursor: pointer; font-size: 14px; }
        .switch-mode:hover { text-decoration: underline; }
        .error { color: #e74c3c; font-size: 12px; margin-top: 12px; }
        .empty-state { text-align: center; padding: 30px; color: #999; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 30px;
            width: 450px;
            max-width: 90%;
        }
        .modal-content h3 { margin-bottom: 20px; color: #8dc63f; }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            outline: none;
        }
        .modal-content .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }
        .modal-content .checkbox-row input {
            width: auto;
            margin: 0;
        }
        .modal-content button {
            padding: 10px 20px;
            margin: 10px 5px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .save-btn { background: #8dc63f; color: white; }
        .cancel-btn { background: #e74c3c; color: white; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app"></div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://eiqtdlzsupmaaycwvjhp.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpcXRkbHpzdXBtYWF5Y3d2amhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjgxOTAsImV4cCI6MjA5MDIwNDE5MH0.IHU21Y-pzzWEOQGU28UanSI0nrjGgstc45HWDRyGuIg';
            
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            let currentUser = null;
            let currentContact = null;
            let messagesSubscription = null;
            let isLoginMode = true;
            
            const countries = [
                { code: "+7", name: "🇷🇺 Россия" },
                { code: "+1", name: "🇺🇸 США/Канада" },
                { code: "+44", name: "🇬🇧 Великобритания" },
                { code: "+49", name: "🇩🇪 Германия" },
                { code: "+33", name: "🇫🇷 Франция" },
                { code: "+34", name: "🇪🇸 Испания" },
                { code: "+39", name: "🇮🇹 Италия" },
                { code: "+86", name: "🇨🇳 Китай" },
                { code: "+81", name: "🇯🇵 Япония" },
                { code: "+82", name: "🇰🇷 Корея" },
                { code: "+55", name: "🇧🇷 Бразилия" },
                { code: "+91", name: "🇮🇳 Индия" },
                { code: "+61", name: "🇦🇺 Австралия" },
                { code: "+380", name: "🇺🇦 Украина" },
                { code: "+375", name: "🇧🇾 Беларусь" }
            ];
            
            const savedUser = localStorage.getItem('timate_user');
            if (savedUser) {
                try {
                    const user = JSON.parse(savedUser);
                    if (user.id) {
                        currentUser = user;
                        supabaseClient.from('users').update({ status: 'online', last_seen: new Date().toISOString() }).eq('id', currentUser.id);
                        loadMainScreen();
                    } else { showAuth(); }
                } catch(e) { showAuth(); }
            } else { showAuth(); }
            
            function saveSession(user) { localStorage.setItem('timate_user', JSON.stringify(user)); }
            function clearSession() { localStorage.removeItem('timate_user'); }
            
            async function showAuth() {
                const countryOptions = countries.map(c => `<option value="${c.code}">${c.name} (${c.code})</option>`).join('');
                document.getElementById('app').innerHTML = `
                    <div class="login-screen">
                        <h1>💚 Timate</h1>
                        <p>${isLoginMode ? 'вход по номеру телефона' : 'регистрация'}</p>
                        ${!isLoginMode ? `
                            <input type="text" id="authUsername" placeholder="Имя пользователя">
                            <input type="text" id="authDisplayName" placeholder="Отображаемое имя">
                            <textarea id="authBio" rows="2" placeholder="О себе (необязательно)"></textarea>
                        ` : ''}
                        <div class="phone-row">
                            <select id="authCountryCode">${countryOptions}</select>
                            <input type="tel" id="authPhone" placeholder="Номер телефона">
                        </div>
                        <input type="password" id="authPassword" placeholder="Пароль">
                        ${!isLoginMode ? `<input type="password" id="authConfirmPassword" placeholder="Повторите пароль">` : ''}
                        <button onclick="window.submitAuth()">${isLoginMode ? 'Войти' : 'Зарегистрироваться'}</button>
                        <div class="switch-mode" onclick="window.switchAuthMode()">
                            ${isLoginMode ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти'}
                        </div>
                        <div id="authError" class="error"></div>
                    </div>
                `;
            }
            
            window.switchAuthMode = function() { isLoginMode = !isLoginMode; showAuth(); };
            
            function validatePhone(phone) { return /^[0-9\s\-\(\)]{5,20}$/.test(phone) && phone.replace(/[^0-9]/g, '').length >= 5; }
            function formatFullPhone(countryCode, phone) { return countryCode + phone.replace(/[^0-9]/g, ''); }
            
            window.submitAuth = async function() {
                const phoneInput = document.getElementById('authPhone');
                const countryCode = document.getElementById('authCountryCode')?.value || '+7';
                const password = document.getElementById('authPassword').value;
                
                if (!phoneInput?.value.trim()) { phoneInput.classList.add('error'); showAuthError('❌ Введите номер телефона'); return; }
                if (!validatePhone(phoneInput.value)) { phoneInput.classList.add('error'); showAuthError('❌ Введите корректный номер телефона'); return; }
                
                const fullPhone = formatFullPhone(countryCode, phoneInput.value);
                
                if (!isLoginMode) {
                    const username = document.getElementById('authUsername')?.value.trim();
                    const displayName = document.getElementById('authDisplayName')?.value.trim();
                    const bio = document.getElementById('authBio')?.value.trim() || '';
                    const confirmPassword = document.getElementById('authConfirmPassword')?.value;
                    
                    if (!username) { document.getElementById('authUsername').classList.add('error'); showAuthError('❌ Введите имя пользователя'); return; }
                    if (!displayName) { document.getElementById('authDisplayName').classList.add('error'); showAuthError('❌ Введите отображаемое имя'); return; }
                    if (!password) { document.getElementById('authPassword').classList.add('error'); showAuthError('❌ Введите пароль'); return; }
                    if (password !== confirmPassword) { showAuthError('❌ Пароли не совпадают'); return; }
                    if (password.length < 3) { showAuthError('❌ Пароль должен быть не менее 3 символов'); return; }
                    
                    const { data: existingPhone } = await supabaseClient.from('users').select('*').eq('phone', fullPhone).single();
                    if (existingPhone) { phoneInput.classList.add('error'); showAuthError('❌ Этот номер уже зарегистрирован'); return; }
                    
                    const { data: newUser, error } = await supabaseClient.from('users').insert({
                        username, display_name: displayName, password, phone: fullPhone, bio,
                        avatar_color: '#9b59b6', status: 'online', last_seen: new Date().toISOString(),
                        hide_phone: false, invisible_mode: false
                    }).select().single();
                    
                    if (error) { showAuthError('❌ Ошибка: ' + error.message); return; }
                    currentUser = newUser; saveSession(currentUser); await loadMainScreen();
                } else {
                    const { data: user } = await supabaseClient.from('users').select('*').eq('phone', fullPhone).single();
                    if (!user || user.password !== password) {
                        phoneInput.classList.add('error'); document.getElementById('authPassword').classList.add('error');
                        showAuthError('❌ Неверный номер или пароль'); return;
                    }
                    currentUser = user; saveSession(currentUser);
                    await supabaseClient.from('users').update({ status: 'online', last_seen: new Date().toISOString() }).eq('id', currentUser.id);
                    await loadMainScreen();
                }
            };
            
            async function loadMainScreen() {
                document.getElementById('app').innerHTML = `
                    <div class="timate-container">
                        <div class="sidebar">
                            <div class="sidebar-header"><h2>Timate</h2><p>💚 салатовый мессенджер</p></div>
                            <div class="current-user">
                                <div class="user-avatar">${(currentUser.display_name || currentUser.username).charAt(0).toUpperCase()}</div>
                                <div class="user-info">
                                    <div class="user-name">${escapeHtml(currentUser.display_name || currentUser.username)}</div>
                                    <div class="user-status">🟢 онлайн</div>
                                    ${!currentUser.hide_phone ? `<div class="user-phone">${escapeHtml(currentUser.phone || '')}</div>` : ''}
                                    ${currentUser.bio ? `<div class="user-bio">${escapeHtml(currentUser.bio)}</div>` : ''}
                                </div>
                                <button class="settings-btn" onclick="window.openSettings()" title="Настройки">⚙️</button>
                                <button class="logout-btn" onclick="window.logout()" title="Выйти">🚪</button>
                            </div>
                            <div class="search-box">
                                <input type="text" id="searchInput" placeholder="🔍 Поиск по имени или номеру..." oninput="window.searchUsers()">
                            </div>
                            <div class="tabs">
                                <div class="tab active" onclick="window.switchTab('contacts')">📱 Контакты</div>
                                <div class="tab" onclick="window.switchTab('users')">🌍 Все пользователи</div>
                            </div>
                            <div id="contactsList" class="contacts-list"><div class="empty-state">Загрузка...</div></div>
                            <div id="usersList" class="users-list" style="display: none;"></div>
                        </div>
                        <div class="chat-area" id="chatArea"><div class="empty-state">💬 Выберите контакт для общения</div></div>
                    </div>
                `;
                await loadContacts(); await loadAllUsers(); setupRealtime();
            }
            
            window.openSettings = function() {
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3>⚙️ Настройки профиля</h3>
                        <input type="text" id="settingsDisplayName" placeholder="Отображаемое имя" value="${escapeHtml(currentUser.display_name || '')}">
                        <textarea id="settingsBio" rows="3" placeholder="О себе">${escapeHtml(currentUser.bio || '')}</textarea>
                        <div class="phone-row">
                            <select id="settingsCountryCode">${countries.map(c => `<option value="${c.code}" ${currentUser.phone?.startsWith(c.code) ? 'selected' : ''}>${c.name} (${c.code})</option>`).join('')}</select>
                            <input type="tel" id="settingsPhone" placeholder="Номер телефона" value="${currentUser.phone ? currentUser.phone.replace(/^\+?\d+/, '') : ''}">
                        </div>
                        <div class="checkbox-row">
                            <input type="checkbox" id="settingsHidePhone" ${currentUser.hide_phone ? 'checked' : ''}>
                            <label>🔒 Скрыть номер телефона (не показывать другим)</label>
                        </div>
                        <div class="checkbox-row">
                            <input type="checkbox" id="settingsInvisibleMode" ${currentUser.invisible_mode ? 'checked' : ''}>
                            <label>👻 Невидимый режим (не отображаться в списке всех пользователей)</label>
                        </div>
                        <div>
                            <button class="save-btn" onclick="window.saveSettings()">💾 Сохранить</button>
                            <button class="cancel-btn" onclick="this.closest('.modal').remove()">❌ Отмена</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
            };
            
            window.saveSettings = async function() {
                const displayName = document.getElementById('settingsDisplayName').value.trim();
                const bio = document.getElementById('settingsBio').value.trim();
                const countryCode = document.getElementById('settingsCountryCode').value;
                const phoneNumber = document.getElementById('settingsPhone').value.trim();
                const hidePhone = document.getElementById('settingsHidePhone').checked;
                const invisibleMode = document.getElementById('settingsInvisibleMode').checked;
                
                if (!displayName) { alert('Введите отображаемое имя'); return; }
                
                let newPhone = currentUser.phone;
                if (phoneNumber && validatePhone(phoneNumber)) {
                    newPhone = formatFullPhone(countryCode, phoneNumber);
                    const { data: existing } = await supabaseClient.from('users').select('*').eq('phone', newPhone).neq('id', currentUser.id).single();
                    if (existing) { alert('Этот номер уже используется другим пользователем'); return; }
                }
                
                const { error } = await supabaseClient.from('users').update({
                    display_name: displayName,
                    bio: bio,
                    phone: newPhone,
                    hide_phone: hidePhone,
                    invisible_mode: invisibleMode,
                    updated_at: new Date().toISOString()
                }).eq('id', currentUser.id);
                
                if (error) { alert('Ошибка: ' + error.message); return; }
                
                currentUser.display_name = displayName;
                currentUser.bio = bio;
                currentUser.phone = newPhone;
                currentUser.hide_phone = hidePhone;
                currentUser.invisible_mode = invisibleMode;
                saveSession(currentUser);
                
                document.querySelector('.modal')?.remove();
                await loadMainScreen();
                alert('✅ Настройки сохранены');
            };
            
            window.logout = async function() {
                if (currentUser) await supabaseClient.from('users').update({ status: 'offline', last_seen: new Date().toISOString() }).eq('id', currentUser.id);
                clearSession(); currentUser = null; currentContact = null;
                if (messagesSubscription) messagesSubscription.unsubscribe();
                showAuth();
            };
            
            async function loadContacts() {
                const { data: contacts } = await supabaseClient.from('contacts').select(`contact_id, nickname, users:contact_id(*)`).eq('user_id', currentUser.id);
                const container = document.getElementById('contactsList');
                if (!contacts?.length) { container.innerHTML = '<div class="empty-state">📭 Нет контактов</div>'; return; }
                container.innerHTML = contacts.map(c => {
                    const u = c.users;
                    return `<div class="contact-item" onclick="window.selectContact('${u.id}')" data-contact-id="${u.id}">
                        <div class="contact-avatar" style="background: ${u.avatar_color || '#9b59b6'}">${(u.display_name || u.username).charAt(0).toUpperCase()}</div>
                        <div class="contact-info">
                            <div class="contact-name">${escapeHtml(c.nickname || u.display_name || u.username)}</div>
                            <div class="contact-status ${u.status === 'online' ? 'online' : 'offline'}">${u.status === 'online' ? '🟢 онлайн' : '⚫ офлайн'}</div>
                            ${!u.hide_phone && u.phone ? `<div class="contact-phone">${escapeHtml(u.phone)}</div>` : ''}
                            ${u.bio ? `<div class="contact-bio">${escapeHtml(u.bio.substring(0, 40))}</div>` : ''}
                        </div>
                        <div class="call-buttons">
                            <button class="call-btn" onclick="event.stopPropagation(); window.startCall('${u.id}', 'audio')">📞</button>
                            <button class="call-btn" onclick="event.stopPropagation(); window.startCall('${u.id}', 'video')">📹</button>
                        </div>
                    </div>`;
                }).join('');
            }
            
            async function loadAllUsers() {
                let query = supabaseClient.from('users').select('*').neq('id', currentUser.id);
                if (currentUser.invisible_mode) {
                    query = query.eq('invisible_mode', false);
                }
                const { data: users } = await query;
                const container = document.getElementById('usersList');
                if (!users?.length) { container.innerHTML = '<div class="empty-state">👥 Нет других пользователей</div>'; return; }
                const { data: contacts } = await supabaseClient.from('contacts').select('contact_id').eq('user_id', currentUser.id);
                const contactIds = new Set(contacts?.map(c => c.contact_id) || []);
                container.innerHTML = users.filter(u => !u.invisible_mode || u.id === currentUser.id).map(u => `
                    <div class="user-item">
                        <div class="user-avatar-small" style="background: ${u.avatar_color || '#9b59b6'}">${(u.display_name || u.username).charAt(0).toUpperCase()}</div>
                        <div class="user-info-small">
                            <div class="contact-name">${escapeHtml(u.display_name || u.username)}</div>
                            ${!u.hide_phone && u.phone ? `<div style="font-size:11px;color:#999;">${escapeHtml(u.phone)}</div>` : ''}
                            ${u.bio ? `<div style="font-size:10px;color:#666;">${escapeHtml(u.bio.substring(0, 40))}</div>` : ''}
                        </div>
                        ${!contactIds.has(u.id) ? `<button class="add-btn" onclick="window.addContact('${u.id}')">➕ Добавить</button>` : '<span style="font-size:12px;color:#8dc63f;">✓ в контактах</span>'}
                    </div>
                `).join('');
            }
            
            window.searchUsers = async function() {
                const query = document.getElementById('searchInput').value.toLowerCase();
                if (!query) { loadAllUsers(); return; }
                let dbQuery = supabaseClient.from('users').select('*').neq('id', currentUser.id);
                if (currentUser.invisible_mode) dbQuery = dbQuery.eq('invisible_mode', false);
                const { data: users } = await dbQuery.or(`username.ilike.%${query}%,display_name.ilike.%${query}%${!currentUser.hide_phone ? `,phone.ilike.%${query}%` : ''}`);
                const container = document.getElementById('usersList');
                if (!users?.length) { container.innerHTML = '<div class="empty-state">🔍 Ничего не найдено</div>'; return; }
                const { data: contacts } = await supabaseClient.from('contacts').select('contact_id').eq('user_id', currentUser.id);
                const contactIds = new Set(contacts?.map(c => c.contact_id) || []);
                container.innerHTML = users.map(u => `
                    <div class="user-item">
                        <div class="user-avatar-small" style="background: ${u.avatar_color || '#9b59b6'}">${(u.display_name || u.username).charAt(0).toUpperCase()}</div>
                        <div class="user-info-small">
                            <div class="contact-name">${escapeHtml(u.display_name || u.username)}</div>
                            ${!u.hide_phone && u.phone ? `<div style="font-size:11px;color:#999;">${escapeHtml(u.phone)}</div>` : ''}
                        </div>
                        ${!contactIds.has(u.id) ? `<button class="add-btn" onclick="window.addContact('${u.id}')">➕ Добавить</button>` : '<span style="font-size:12px;color:#8dc63f;">✓ в контактах</span>'}
                    </div>
                `).join('');
            };
            
            window.addContact = async function(contactId) {
                await supabaseClient.from('contacts').insert({ user_id: currentUser.id, contact_id: contactId });
                await loadContacts(); await loadAllUsers();
                const searchInput = document.getElementById('searchInput'); if (searchInput) searchInput.value = '';
            };
            
            window.selectContact = async function(contactId) {
                currentContact = contactId;
                document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
                const activeEl = document.querySelector(`.contact-item[data-contact-id="${contactId}"]`);
                if (activeEl) activeEl.classList.add('active');
                await loadMessages(); await renderChat();
            };
            
            async function loadMessages() {
                if (!currentContact) return;
                const { data: messages } = await supabaseClient.from('messages').select('*').or(`and(from_user_id.eq.${currentUser.id},to_user_id.eq.${currentContact}),and(from_user_id.eq.${currentContact},to_user_id.eq.${currentUser.id})`).order('created_at');
                window.currentMessages = messages || [];
                await supabaseClient.from('messages').update({ is_read: true }).eq('from_user_id', currentContact).eq('to_user_id', currentUser.id).eq('is_read', false);
            }
            
            async function renderChat() {
                if (!currentContact) return;
                const { data: contact } = await supabaseClient.from('users').select('*').eq('id', currentContact).single();
                const chatArea = document.getElementById('chatArea');
                const messages = window.currentMessages || [];
                chatArea.innerHTML = `
                    <div class="chat-header">
                        <div class="chat-header-avatar" style="background: ${contact?.avatar_color || '#9b59b6'}">${(contact?.display_name || contact?.username || '?').charAt(0).toUpperCase()}</div>
                        <div class="chat-header-info">
                            <h3>${escapeHtml(contact?.display_name || contact?.username)}</h3>
                            <p>${contact?.status === 'online' ? '🟢 онлайн' : '⚫ офлайн'}</p>
                            ${!contact?.hide_phone && contact?.phone ? `<div class="phone">📞 ${escapeHtml(contact.phone)}</div>` : ''}
                            ${contact?.bio ? `<div class="bio">📝 ${escapeHtml(contact.bio)}</div>` : ''}
                        </div>
                        <div class="call-controls">
                            <button onclick="window.startCall('${currentContact}', 'audio')">📞 Аудио</button>
                            <button onclick="window.startCall('${currentContact}', 'video')">📹 Видео</button>
                        </div>
                    </div>
                    <div class="messages-container" id="messagesContainer">
                        ${messages.length === 0 ? '<div class="empty-state">💬 Нет сообщений</div>' : messages.map(msg => `
                            <div class="message ${msg.from_user_id === currentUser.id ? 'out' : 'in'}">
                                <div class="message-bubble">
                                    <div class="message-text">${escapeHtml(msg.content)}</div>
                                    <div class="message-time">${new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="input-area">
                        <input type="text" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') window.sendMessage()">
                        <button onclick="window.sendMessage()">📤 Отправить</button>
                    </div>
                `;
                const container = document.getElementById('messagesContainer');
                if (container) container.scrollTop = container.scrollHeight;
            }
            
            window.sendMessage = async function() {
                const input = document.getElementById('messageInput');
                const content = input.value.trim();
                if (!content || !currentContact) return;
                await supabaseClient.from('messages').insert({ from_user_id: currentUser.id, to_user_id: currentContact, content });
                input.value = '';
                await loadMessages(); await renderChat();
            };
            
            window.startCall = function(contactId, type) { alert(`🔔 ${type === 'audio' ? 'Аудиозвонок' : 'Видеозвонок'}\n\n(Функция в разработке)`); };
            
            function setupRealtime() {
                if (messagesSubscription) messagesSubscription.unsubscribe();
                messagesSubscription = supabaseClient.channel('messages-channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, async (payload) => {
                    const msg = payload.new;
                    if ((msg.from_user_id === currentContact && msg.to_user_id === currentUser.id) || (msg.from_user_id === currentUser.id && msg.to_user_id === currentContact)) {
                        await loadMessages(); await renderChat();
                    }
                }).subscribe();
            }
            
            window.switchTab = function(tab) {
                const contactsList = document.getElementById('contactsList');
                const usersList = document.getElementById('usersList');
                const tabs = document.querySelectorAll('.tab');
                tabs.forEach((t, i) => { t.classList.remove('active'); if ((tab === 'contacts' && i === 0) || (tab === 'users' && i === 1)) t.classList.add('active'); });
                if (tab === 'contacts') { contactsList.style.display = 'block'; usersList.style.display = 'none'; }
                else { contactsList.style.display = 'none'; usersList.style.display = 'block'; loadAllUsers(); }
            };
            
            function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
            function showAuthError(msg) { const e = document.getElementById('authError'); if(e){ e.textContent=msg; setTimeout(()=>e.textContent='',3000); } }
            
            window.addEventListener('beforeunload', async () => { if(currentUser) await supabaseClient.from('users').update({ status: 'offline', last_seen: new Date().toISOString() }).eq('id', currentUser.id); });
        })();
    </script>
</body>
</html>
