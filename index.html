        body {

            justify-content: center;

        }
        .timate-container {

            height: 90vh;

            overflow: hidden;

        .sidebar {

        .contact-item:hover, .user-item:hover, .chat-item:hover, .channel-item:hover { background: #f8f9fa; }
        .contact-item.active, .chat-item.active {
            background: #f3e5f5;

        .contact-avatar, .user-avatar-small, .chat-avatar, .channel-avatar {

            font-weight: bold;

        .contact-info, .user-info-small, .chat-info { flex: 1; }

        .contact-status, .chat-type { font-size: 11px; }

        .contact-actions {

            border: none;

            align-items: center;
            justify-content: center;
        }
        .voice-wave {
            flex: 1;
            height: 40px;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .voice-wave span {
            width: 3px;
            background: currentColor;
            border-radius: 2px;
            animation: wave 0.5s infinite ease-in-out;
        }
        .voice-wave span:nth-child(1) { height: 12px; animation-delay: 0s; }
        .voice-wave span:nth-child(2) { height: 20px; animation-delay: 0.1s; }
        .voice-wave span:nth-child(3) { height: 28px; animation-delay: 0.2s; }
        .voice-wave span:nth-child(4) { height: 20px; animation-delay: 0.3s; }
        .voice-wave span:nth-child(5) { height: 12px; animation-delay: 0.4s; }
        @keyframes wave {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.5); }
        }
        .voice-duration { font-size: 12px; opacity: 0.7; min-width: 40px; }
        .voice-text { font-size: 12px; opacity: 0.8; margin-top: 4px; font-style: italic; }
        .input-area {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }
        .voice-record-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #e74c3c;
            color: white;
            border: none;
            cursor: pointer;
        }
        .voice-record-btn.recording {
            background: #c0392b;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 30px;
            width: 500px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 20px; color: #8dc63f; }
        .modal-content h3 i { margin-right: 8px; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            outline: none;
        }
        .modal-content .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }
        .modal-content button {
            padding: 10px 20px;
            margin: 10px 5px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .save-btn { background: #8dc63f; color: white; }
        .cancel-btn { background: #e74c3c; color: white; }
        .accept-btn { background: #9b59b6; color: white; }
        .empty-state { text-align: center; padding: 30px; color: #999; }
        .empty-state i { font-size: 48px; margin-bottom: 15px; display: block; color: #ccc; }
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #8dc63f;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            z-index: 1000;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .login-screen {
            width: 450px;
            background: rgba(255,255,255,0.98);
            border-radius: 28px;
            padding: 40px;
            text-align: center;
        }
        .login-screen h1 { color: #8dc63f; margin-bottom: 8px; font-size: 32px; }
        .login-screen input, .login-screen select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
        }
        .phone-row { display: flex; gap: 10px; margin: 10px 0; }
        .phone-row select { width: 35%; margin: 0; }
        .phone-row input { width: 65%; margin: 0; }
        .login-screen button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #9b59b6;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        .switch-mode { margin-top: 15px; color: #9b59b6; cursor: pointer; font-size: 14px; }
        .privacy-link {
            font-size: 12px;
            color: #999;
            margin-top: 15px;
            cursor: pointer;
        }
        .privacy-link i { margin-right: 4px; }
        .privacy-link span { color: #9b59b6; text-decoration: underline; }
        .error { color: #e74c3c; font-size: 12px; margin-top: 10px; }
    </style>

<body>
    <div id="app"></div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://eiqtdlzsupmaaycwvjhp.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpcXRkbHpzdXBtYWF5Y3d2amhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjgxOTAsImV4cCI6MjA5MDIwNDE5MH0.IHU21Y-pzzWEOQGU28UanSI0nrjGgstc45HWDRyGuIg';
            
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            let currentUser = null;
            let currentContact = null;
            let currentChat = null;
            let currentChatType = null;
            let autoUpdateInterval = null;
            let lastMessagesMap = new Map();
            let isMainScreenLoaded = false;
            let notificationsEnabled = false;
            let mediaRecorder = null;
            let audioChunks = [];
            let isRecording = false;
            let currentAudio = null;
            let privacyAccepted = localStorage.getItem('privacy_accepted') === 'true';
            let activeTab = 'contacts';
            
            let recognition = null;
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = 'ru-RU';
                recognition.interimResults = true;
            }
            
            async function requestNotificationPermission() {
                if (!('Notification' in window)) return;
                if (Notification.permission === 'granted') notificationsEnabled = true;
                else if (Notification.permission !== 'denied') {
                    const permission = await Notification.requestPermission();
                    notificationsEnabled = permission === 'granted';
                }
            }
            
            function sendPushNotification(title, body) {
                if (!notificationsEnabled || document.hasFocus()) return;
                try { new Notification(title, { body: body, silent: false }); } catch(e) {}
            }
            
            async function sendVoiceMessage(receiverId, audioBlob, text) {
                const fileName = `voice_${currentUser.id}_${Date.now()}.webm`;
                const { error } = await supabaseClient.storage.from('voice_messages').upload(fileName, audioBlob);
                if (error) { console.error('Upload error:', error); return false; }
                const { data: urlData } = supabaseClient.storage.from('voice_messages').getPublicUrl(fileName);
                const { error: insertError } = await supabaseClient.from('calls').insert({
                    caller_id: currentUser.id, receiver_id: receiverId,
                    audio_url: urlData.publicUrl, text: text, duration: Math.round(audioBlob.size / 1000)
                });
                if (insertError) { console.error('Insert error:', insertError); return false; }
                return true;
            }
            
            function startSpeechToText(callback) {
                if (!recognition) { callback(null, 'not supported'); return; }
                recognition.onresult = (event) => { callback(event.results[0][0].transcript, null); };
                recognition.onerror = () => { callback(null, 'error'); };
                recognition.start();
            }
            
            async function startRecording() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = (event) => { audioChunks.push(event.data); };
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        stream.getTracks().forEach(track => track.stop());
                        startSpeechToText(async (text, error) => {
                            const finalText = text || '🎤 Голосовое сообщение';
                            if (currentContact) {
                                await sendVoiceMessage(currentContact, audioBlob, finalText);
                                showNotification('Голосовое сообщение отправлено');
                                await loadMessages(currentContact);
                                await renderChat(currentContact);
                            }
                        });
                    };
                    mediaRecorder.start();
                    isRecording = true;
                    updateRecordButton(true);
                } catch(e) {
                    showNotification('❌ Нет доступа к микрофону');
                }
            }
            
            function stopRecording() {
                if (mediaRecorder && isRecording) {
                    mediaRecorder.stop();
                    isRecording = false;
                    updateRecordButton(false);
                }
            }
            
            function updateRecordButton(recording) {
                const btn = document.getElementById('voiceRecordBtn');
                if (btn) {
                    if (recording) { btn.classList.add('recording'); btn.innerHTML = '<i class="fas fa-stop"></i>'; }
                    else { btn.classList.remove('recording'); btn.innerHTML = '<i class="fas fa-microphone"></i>'; }
                }
            }
            
            const savedUser = localStorage.getItem('timate_user');
            if (savedUser) {
                try {
                    const user = JSON.parse(savedUser);
                    if (user.id) {
                        currentUser = user;
                        supabaseClient.from('users').update({ status: 'online' }).eq('id', currentUser.id);
                        requestNotificationPermission();
                        loadMainScreen();
                    } else { showAuth(); }
                } catch(e) { showAuth(); }
            } else { showAuth(); }
            
            function saveSession(user) { localStorage.setItem('timate_user', JSON.stringify(user)); }
            function clearSession() { localStorage.removeItem('timate_user'); }
            function showNotification(msg) {
                const notif = document.createElement('div');
                notif.className = 'notification';
                notif.innerHTML = `<i class="fas fa-bell"></i> ${msg}`;
                document.body.appendChild(notif);
                setTimeout(() => notif.remove(), 3000);
            }
            
            function showPrivacyPolicy() {
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3><i class="fas fa-shield-alt"></i> Политика конфиденциальности Timate</h3>
                        <p><strong>Дата вступления в силу:</strong> 28 марта 2026 г.</p>
                        <h4>1. Какие данные мы собираем</h4>
                        <p>• Имя пользователя и отображаемое имя<br>• Номер телефона (для входа)<br>• Пароль (хранится в зашифрованном виде)<br>• Сообщения и история чатов</p>
                        <h4>2. Как мы используем данные</h4>
                        <p>• Для обеспечения работы мессенджера<br>• Для идентификации пользователей<br>• Для доставки сообщений</p>
                        <h4>3. Передача данных третьим лицам</h4>
                        <p><i class="fas fa-times-circle" style="color:#e74c3c;"></i> Мы НЕ передаём ваши данные третьим лицам.<br><i class="fas fa-check-circle" style="color:#2ecc71;"></i> Все данные хранятся в Supabase.</p>
                        <h4>4. Контакты</h4>
                        <p>По вопросам: <a href="https://t.me/Timatebbot" target="_blank">@Timatebbot</a></p>
                        <hr>
                        <div class="checkbox-row">
                            <input type="checkbox" id="acceptPrivacy" ${privacyAccepted ? 'checked' : ''}>
                            <label><i class="fas fa-check-circle"></i> Я принимаю условия</label>
                        </div>
                        <button class="accept-btn" onclick="window.acceptPrivacy()"><i class="fas fa-check"></i> Принять</button>
                        <button class="cancel-btn" onclick="this.closest('.modal').remove()"><i class="fas fa-times"></i> Закрыть</button>
                    </div>
                `;
                document.body.appendChild(modal);
            }
            
            window.acceptPrivacy = function() {
                const checkbox = document.getElementById('acceptPrivacy');
                if (!checkbox.checked) { alert('Примите условия'); return; }
                privacyAccepted = true;
                localStorage.setItem('privacy_accepted', 'true');
                document.querySelector('.modal')?.remove();
                showNotification('Условия приняты');
            };
            
            async function showAuth() {
                document.getElementById('app').innerHTML = `
                    <div class="login-screen">
                        <h1><i class="fas fa-comment"></i> Timate</h1>
                        <p>вход по номеру телефона</p>
                        <div class="phone-row">
                            <select id="authCountryCode">
                                <option value="+7">🇷🇺 Россия (+7)</option>
                                <option value="+1">🇺🇸 США (+1)</option>
                                <option value="+44">🇬🇧 Великобритания (+44)</option>
                            </select>
                            <input type="tel" id="authPhone" placeholder="Номер телефона (только цифры)">
                        </div>
                        <input type="password" id="authPassword" placeholder="Пароль">
                        <button onclick="window.login()"><i class="fas fa-sign-in-alt"></i> Войти</button>
                        <div class="switch-mode" onclick="window.showRegister()"><i class="fas fa-user-plus"></i> Нет аккаунта? Зарегистрироваться</div>
                        <div class="privacy-link" onclick="showPrivacyPolicy()"><i class="fas fa-file-contract"></i> <span>Политика конфиденциальности</span></div>
                        <div id="authError" class="error"></div>
                    </div>
                `;
            }
            
            window.login = async function() {
                if (!privacyAccepted) { showPrivacyPolicy(); return; }
                const phone = document.getElementById('authPhone').value;
                const password = document.getElementById('authPassword').value;
                const countryCode = document.getElementById('authCountryCode').value;
                const phoneDigits = phone.replace(/[^0-9]/g, '');
                if (!phoneDigits || phoneDigits.length < 5) {
                    document.getElementById('authError').textContent = '❌ Введите корректный номер телефона';
                    return;
                }
                const fullPhone = countryCode + phoneDigits;
                const { data: user } = await supabaseClient.from('users').select('*').eq('phone', fullPhone).single();
                if (!user || user.password !== password) {
                    document.getElementById('authError').textContent = '❌ Неверный номер или пароль';
                    return;

            window.register = async function() {

                }
                const phoneDigits = phone.replace(/[^0-9]/g, '');
                if (!phoneDigits || phoneDigits.length < 5) {
                    document.getElementById('regError').textContent = '❌ Введите корректный номер телефона (только цифры)';
                    return;
                }
                if (password !== confirm) { document.getElementById('regError').textContent = '❌ Пароли не совпадают'; return; }
                if (password.length < 3) { document.getElementById('regError').textContent = '❌ Пароль минимум 3 символа'; return; }

                const { data: existing } = await supabaseClient.from('users').select('*').eq('phone', fullPhone).single();
                if (existing) { document.getElementById('regError').textContent = '❌ Номер уже зарегистрирован'; return; }

                document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
                const activeEl = document.querySelector(`.chat-item[data-chat-id="${chatId}"]`);

            async function loadMessages(contactId) {
                const [messages, voiceMessages] = await Promise.all([
                    supabaseClient.from('messages').select('*').or(`and(from_user_id.eq.${currentUser.id},to_user_id.eq.${contactId}),and(from_user_id.eq.${contactId},to_user_id.eq.${currentUser.id})`).order('created_at'),
                    supabaseClient.from('calls').select('*').or(`and(caller_id.eq.${currentUser.id},receiver_id.eq.${contactId}),and(caller_id.eq.${contactId},receiver_id.eq.${currentUser.id})`).order('created_at')
                ]);
                const allMessages = [
                    ...(messages.data || []).map(m => ({ ...m, type: 'text' })),
                    ...(voiceMessages.data || []).map(v => ({ ...v, type: 'voice', from_user_id: v.caller_id, to_user_id: v.receiver_id, content: v.text, audio_url: v.audio_url }))
                ];
                allMessages.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                window.currentMessages = allMessages;
            }

                const name = document.getElementById('chatName').value.trim();
                const description = document.getElementById('chatDescription').value.trim();
                const isPrivate = type === 'channel' ? document.getElementById('isPrivate')?.checked : true;
                if (!name) { alert('Введите название'); return; }
                const { data: chat, error } = await supabaseClient.from('chats').insert({
                    name, type, is_private: isPrivate, description, avatar_color: '#8dc63f', created_by: currentUser.id
                }).select().single();
                if (error) { alert('Ошибка'); return; }
                document.querySelector('.modal')?.remove();
                showNotification(`${type === 'group' ? 'Группа' : 'Канал'} "${name}" создан`);
                await loadMyChats();
                if (activeTab === 'chats') switchTab('chats');
            };
            
            function startAutoUpdate() {
                if (autoUpdateInterval) clearInterval(autoUpdateInterval);
                autoUpdateInterval = setInterval(async () => {
                    if (currentContact) {
                        await loadMessages(currentContact);
                        const currentString = JSON.stringify(window.currentMessages);
                        const lastString = lastMessagesMap.get(`private_${currentContact}`) || '';
                        if (currentString !== lastString) {
                            lastMessagesMap.set(`private_${currentContact}`, currentString);
                            await renderChat(currentContact);
                            const newMessages = window.currentMessages || [];
                            const oldMessages = lastString ? JSON.parse(lastString) : [];
                            if (newMessages.length > oldMessages.length) {
                                const lastMsg = newMessages[newMessages.length - 1];
                                if (lastMsg && lastMsg.from_user_id !== currentUser.id) {
                                    const { data: sender } = await supabaseClient.from('users').select('display_name').eq('id', lastMsg.from_user_id).single();
                                    const title = `💬 ${sender?.display_name || 'Пользователь'}`;
                                    const body = lastMsg.type === 'voice' ? '🎤 Голосовое сообщение' : lastMsg.content;
                                    sendPushNotification(title, body);
                                }
                            }
                        }
                    } else if (currentChat) {
                        await loadGroupMessages(currentChat);
                        const currentString = JSON.stringify(window.currentMessages);
                        const lastString = lastMessagesMap.get(`group_${currentChat}`) || '';
                        if (currentString !== lastString) {
                            lastMessagesMap.set(`group_${currentChat}`, currentString);
                            await renderGroupChat(currentChat);
                            const newMessages = window.currentMessages || [];
                            const oldMessages = lastString ? JSON.parse(lastString) : [];
                            if (newMessages.length > oldMessages.length) {
                                const lastMsg = newMessages[newMessages.length - 1];
                                if (lastMsg && lastMsg.from_user_id !== currentUser.id) {
                                    const title = `💬 Новое сообщение в чате`;
                                    sendPushNotification(title, lastMsg.content);
                                }
                            }
                        }
                    }
                }, 300);
            }
            
            window.switchTab = function(tab) {
                activeTab = tab;
                const contactsList = document.getElementById('contactsList');
                const usersList = document.getElementById('usersList');
                const chatsList = document.getElementById('chatsList');
                const publicList = document.getElementById('publicChannelsList');
                if (contactsList) contactsList.style.display = tab === 'contacts' ? 'block' : 'none';
                if (usersList) usersList.style.display = tab === 'users' ? 'block' : 'none';
                if (chatsList) chatsList.style.display = tab === 'chats' ? 'block' : 'none';
                if (publicList) publicList.style.display = tab === 'public' ? 'block' : 'none';
                document.querySelectorAll('.tab').forEach((t, i) => {
                    t.classList.remove('active');
                    if ((tab === 'contacts' && i === 0) || (tab === 'users' && i === 1) || (tab === 'chats' && i === 2) || (tab === 'public' && i === 3)) t.classList.add('active');
                });
                if (tab === 'users') loadAllUsers();
                if (tab === 'chats') loadMyChats();
                if (tab === 'public') loadPublicChannels();
                const searchInput = document.getElementById('searchInput');
                if (searchInput) searchInput.value = '';
            };
            
            window.openSettings = function() {
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3><i class="fas fa-cog"></i> Настройки профиля</h3>
                        <input type="text" id="settingsDisplayName" placeholder="Отображаемое имя" value="${escapeHtml(currentUser.display_name || '')}">
                        <textarea id="settingsBio" rows="3" placeholder="О себе">${escapeHtml(currentUser.bio || '')}</textarea>
                        <div class="phone-row">
                            <select id="settingsCountryCode"><option value="+7">+7</option><option value="+1">+1</option><option value="+44">+44</option></select>
                            <input type="tel" id="settingsPhone" placeholder="Номер" value="${currentUser.phone ? currentUser.phone.replace(/^\+?\d+/, '') : ''}">
                        </div>
                        <div class="checkbox-row"><input type="checkbox" id="settingsHidePhone" ${currentUser.hide_phone ? 'checked' : ''}><label><i class="fas fa-eye-slash"></i> Скрыть номер</label></div>
                        <div class="checkbox-row"><input type="checkbox" id="settingsInvisibleMode" ${currentUser.invisible_mode ? 'checked' : ''}><label><i class="fas fa-user-secret"></i> Невидимый режим</label></div>
                        <div class="checkbox-row"><input type="checkbox" id="settingsNotifications" ${notificationsEnabled ? 'checked' : ''}><label><i class="fas fa-bell"></i> Включить уведомления</label></div>
                        <button class="save-btn" onclick="saveSettings()"><i class="fas fa-save"></i> Сохранить</button>
                        <button class="cancel-btn" onclick="this.closest('.modal').remove()"><i class="fas fa-times"></i> Отмена</button>
                    </div>
                `;
                document.body.appendChild(modal);
            };
            
            window.saveSettings = async function() {
                const displayName = document.getElementById('settingsDisplayName').value.trim();
                const bio = document.getElementById('settingsBio').value.trim();
                const phoneNumber = document.getElementById('settingsPhone').value.trim();
                const hidePhone = document.getElementById('settingsHidePhone').checked;
                const invisibleMode = document.getElementById('settingsInvisibleMode').checked;
                const enableNotifications = document.getElementById('settingsNotifications').checked;
                if (!displayName) { alert('Введите имя'); return; }
                const phoneDigits = phoneNumber.replace(/[^0-9]/g, '');
                let newPhone = currentUser.phone;
                if (phoneDigits) {
                    const countryCode = document.getElementById('settingsCountryCode').value;
                    newPhone = countryCode + phoneDigits;
                    const { data: existing } = await supabaseClient.from('users').select('*').eq('phone', newPhone).neq('id', currentUser.id).single();
                    if (existing) { alert('Номер уже используется'); return; }
                }
                const { error } = await supabaseClient.from('users').update({
                    display_name: displayName, bio, phone: newPhone, hide_phone: hidePhone, invisible_mode: invisibleMode
                }).eq('id', currentUser.id);
                if (error) { alert('Ошибка'); return; }
                currentUser.display_name = displayName; currentUser.bio = bio; currentUser.phone = newPhone;
                currentUser.hide_phone = hidePhone; currentUser.invisible_mode = invisibleMode;
                saveSession(currentUser);
                if (enableNotifications && !notificationsEnabled) await requestNotificationPermission();
                else if (!enableNotifications && notificationsEnabled) notificationsEnabled = false;
                document.querySelector('.modal')?.remove();
                await loadMainScreen();
                showNotification('Профиль обновлён');
            };
            
            window.logout = async function() {
                if (currentUser) await supabaseClient.from('users').update({ status: 'offline' }).eq('id', currentUser.id);
                if (autoUpdateInterval) clearInterval(autoUpdateInterval);
                clearSession(); currentUser = null; currentContact = null; currentChat = null;
                isMainScreenLoaded = false;
                showAuth();
            };
            
            function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        })();
    </script>
</body>
</html>
