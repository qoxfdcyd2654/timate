<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Timate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #c5e88a 0%, #8dc63f 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .timate-container {
            width: 1200px;
            max-width: 95%;
            height: 90vh;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .sidebar {
            width: 320px;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(0, 0, 0, 0.08);
        }
        .sidebar-header {
            background: #8dc63f;
            padding: 20px;
            text-align: center;
        }
        .sidebar-header h2 { color: white; font-size: 26px; }
        .sidebar-header h2 i { margin-right: 8px; }
        .sidebar-header p { color: rgba(255,255,255,0.8); font-size: 12px; }
        .current-user {
            padding: 15px;
            background: white;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #eee;
        }
        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: #9b59b6;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }
        .user-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .user-info { flex: 1; }
        .user-name { font-weight: bold; color: #2c3e50; }
        .user-status { font-size: 12px; color: #2ecc71; }
        .user-status i { font-size: 8px; margin-right: 4px; }
        .settings-btn, .logout-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
            color: #666;
        }
        .settings-btn:hover, .logout-btn:hover { background: #f0f0f0; }
        .search-box { padding: 15px; border-bottom: 1px solid #eee; position: relative; }
        .search-box i {
            position: absolute;
            left: 28px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }
        .search-box input {
            width: 100%;
            padding: 10px 12px 10px 35px;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #eee;
            background: #f8f9fa;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }
        .tab i { margin-right: 6px; }
        .tab.active {
            background: white;
            color: #9b59b6;
            border-bottom: 2px solid #9b59b6;
        }
        .contacts-list, .users-list, .chats-list {
            flex: 1;
            overflow-y: auto;
            background: white;
        }
        .contact-item, .user-item, .chat-item {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.2s;
        }
        .contact-item:hover, .user-item:hover, .chat-item:hover { background: #f8f9fa; }
        .contact-item.active, .chat-item.active {
            background: #f3e5f5;
            border-left: 3px solid #9b59b6;
        }
        .contact-avatar, .user-avatar-small, .chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
            background: #9b59b6;
        }
        .contact-avatar img, .user-avatar-small img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .contact-info, .user-info-small, .chat-info { flex: 1; }
        .contact-name, .chat-name { font-weight: 600; color: #2c3e50; }
        .contact-status, .chat-type { font-size: 11px; }
        .contact-status.online { color: #2ecc71; }
        .contact-status.offline { color: #999; }
        .contact-actions, .call-buttons {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }
        .call-btn, .delete-contact-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 6px;
            border-radius: 50%;
            transition: background 0.2s;
            color: #666;
        }
        .call-btn:hover, .delete-contact-btn:hover { background: #f0f0f0; }
        .delete-contact-btn { color: #e74c3c; }
        .add-btn {
            background: #9b59b6;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .create-chat-btn {
            margin: 10px;
            padding: 10px;
            background: #9b59b6;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }
        .create-chat-btn i { margin-right: 8px; }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        .chat-header {
            padding: 15px 20px;
            background: white;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #9b59b6;
            color: white;
            font-size: 24px;
        }
        .chat-header-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .chat-header-info { flex: 1; }
        .chat-header-info h3 { color: #2c3e50; font-size: 18px; }
        .chat-header-info p { font-size: 12px; color: #2ecc71; }
        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message { display: flex; }
        .message.out { justify-content: flex-end; }
        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
        }
        .message.in .message-bubble {
            background: white;
            color: #2c3e50;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message.out .message-bubble {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message-text { word-wrap: break-word; font-size: 14px; }
        .message-time { font-size: 10px; margin-top: 5px; opacity: 0.7; text-align: right; }
        .voice-message {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .voice-play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .voice-play-btn:hover { background: rgba(0,0,0,0.2); }
        .voice-wave {
            flex: 1;
            height: 40px;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .voice-wave span {
            width: 3px;
            background: currentColor;
            border-radius: 2px;
            animation: wave 0.5s infinite ease-in-out;
        }
        .voice-wave span:nth-child(1) { height: 12px; animation-delay: 0s; }
        .voice-wave span:nth-child(2) { height: 20px; animation-delay: 0.1s; }
        .voice-wave span:nth-child(3) { height: 28px; animation-delay: 0.2s; }
        .voice-wave span:nth-child(4) { height: 20px; animation-delay: 0.3s; }
        .voice-wave span:nth-child(5) { height: 12px; animation-delay: 0.4s; }
        @keyframes wave {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.5); }
        }
        .voice-duration { font-size: 12px; opacity: 0.7; min-width: 40px; }
        .voice-text { font-size: 12px; opacity: 0.8; margin-top: 4px; font-style: italic; }
        .input-area {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }
        .voice-record-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #e74c3c;
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .voice-record-btn.recording {
            background: #c0392b;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 30px;
            width: 500px;
            max-width: 90%;
        }
        .empty-state { text-align: center; padding: 30px; color: #999; }
        .empty-state i { font-size: 48px; margin-bottom: 15px; display: block; color: #ccc; }
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #8dc63f;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            z-index: 1000;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .login-screen {
            width: 450px;
            background: rgba(255,255,255,0.98);
            border-radius: 28px;
            padding: 40px;
            text-align: center;
        }
        .login-screen h1 { color: #8dc63f; margin-bottom: 8px; font-size: 32px; }
        .login-screen input, .login-screen select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
        }
        .phone-row { display: flex; gap: 10px; margin: 10px 0; }
        .phone-row select { width: 35%; margin: 0; }
        .phone-row input { width: 65%; margin: 0; }
        .login-screen button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #9b59b6;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        .switch-mode { margin-top: 15px; color: #9b59b6; cursor: pointer; font-size: 14px; }
        .error { color: #e74c3c; font-size: 12px; margin-top: 10px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app"></div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://eiqtdlzsupmaaycwvjhp.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpcXRkbHpzdXBtYWF5Y3d2amhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjgxOTAsImV4cCI6MjA5MDIwNDE5MH0.IHU21Y-pzzWEOQGU28UanSI0nrjGgstc45HWDRyGuIg';
            
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            let currentUser = null;
            let currentContact = null;
            let currentChat = null;
            let autoUpdateInterval = null;
            let lastMessagesMap = new Map();
            let isMainScreenLoaded = false;
            let notificationsEnabled = false;
            let mediaRecorder = null;
            let audioChunks = [];
            let isRecording = false;
            let currentAudio = null;
            
            // Speech Recognition для преобразования голоса в текст
            let recognition = null;
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = 'ru-RU';
                recognition.interimResults = true;
                recognition.maxAlternatives = 1;
            }
            
            async function requestNotificationPermission() {
                if (!('Notification' in window)) return;
                if (Notification.permission === 'granted') notificationsEnabled = true;
                else if (Notification.permission !== 'denied') {
                    const permission = await Notification.requestPermission();
                    notificationsEnabled = permission === 'granted';
                }
            }
            
            function sendPushNotification(title, body) {
                if (!notificationsEnabled || document.hasFocus()) return;
                try {
                    new Notification(title, { body: body, silent: false });
                } catch(e) {}
            }
            
            // Функция для отправки голосового сообщения
            async function sendVoiceMessage(receiverId, audioBlob, text) {
                const fileName = `voice_${currentUser.id}_${Date.now()}.webm`;
                const { data, error } = await supabaseClient.storage
                    .from('voice_messages')
                    .upload(fileName, audioBlob);
                
                if (error) { console.error('Upload error:', error); return false; }
                
                const { data: urlData } = supabaseClient.storage
                    .from('voice_messages')
                    .getPublicUrl(fileName);
                
                const { error: insertError } = await supabaseClient
                    .from('calls')
                    .insert({
                        caller_id: currentUser.id,
                        receiver_id: receiverId,
                        audio_url: urlData.publicUrl,
                        text: text,
                        duration: Math.round(audioBlob.size / 1000)
                    });
                
                if (insertError) { console.error('Insert error:', insertError); return false; }
                return true;
            }
            
            // Функция для воспроизведения голосового сообщения
            function playVoiceMessage(audioUrl) {
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio = null;
                }
                const audio = new Audio(audioUrl);
                currentAudio = audio;
                audio.play();
                audio.onended = () => { currentAudio = null; };
            }
            
            // Функция для преобразования голоса в текст
            function startSpeechToText(callback) {
                if (!recognition) {
                    callback(null, 'Speech recognition not supported');
                    return;
                }
                
                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    callback(transcript, null);
                };
                
                recognition.onerror = (event) => {
                    callback(null, 'Ошибка распознавания');
                };
                
                recognition.start();
            }
            
            // Функция для записи голоса
            async function startRecording() {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    stream.getTracks().forEach(track => track.stop());
                    
                    // Преобразуем голос в текст
                    startSpeechToText(async (text, error) => {
                        const finalText = text || '🎤 Голосовое сообщение';
                        if (currentContact) {
                            await sendVoiceMessage(currentContact, audioBlob, finalText);
                            showNotification('Голосовое сообщение отправлено');
                        } else if (currentChat) {
                            // Для групп пока просто текст
                            await supabaseClient.from('messages').insert({
                                from_user_id: currentUser.id,
                                chat_id: currentChat,
                                content: `🎤 ${finalText}`
                            });
                        }
                        await loadMessages();
                    });
                };
                
                mediaRecorder.start();
                isRecording = true;
                updateRecordButton(true);
            }
            
            function stopRecording() {
                if (mediaRecorder && isRecording) {
                    mediaRecorder.stop();
                    isRecording = false;
                    updateRecordButton(false);
                }
            }
            
            function updateRecordButton(recording) {
                const btn = document.getElementById('voiceRecordBtn');
                if (btn) {
                    if (recording) {
                        btn.classList.add('recording');
                        btn.innerHTML = '<i class="fas fa-stop"></i>';
                    } else {
                        btn.classList.remove('recording');
                        btn.innerHTML = '<i class="fas fa-microphone"></i>';
                    }
                }
            }
            
            async function loadVoiceMessages(contactId) {
                const { data: calls } = await supabaseClient
                    .from('calls')
                    .select('*')
                    .or(`and(caller_id.eq.${currentUser.id},receiver_id.eq.${contactId}),and(caller_id.eq.${contactId},receiver_id.eq.${currentUser.id})`)
                    .order('created_at');
                return calls || [];
            }
            
            const savedUser = localStorage.getItem('timate_user');
            if (savedUser) {
                try {
                    const user = JSON.parse(savedUser);
                    if (user.id) {
                        currentUser = user;
                        supabaseClient.from('users').update({ status: 'online' }).eq('id', currentUser.id);
                        requestNotificationPermission();
                        loadMainScreen();
                    } else { showAuth(); }
                } catch(e) { showAuth(); }
            } else { showAuth(); }
            
            function saveSession(user) { localStorage.setItem('timate_user', JSON.stringify(user)); }
            function clearSession() { localStorage.removeItem('timate_user'); }
            function showNotification(msg) {
                const notif = document.createElement('div');
                notif.className = 'notification';
                notif.innerHTML = `<i class="fas fa-bell"></i> ${msg}`;
                document.body.appendChild(notif);
                setTimeout(() => notif.remove(), 3000);
            }
            
            async function showAuth() {
                document.getElementById('app').innerHTML = `
                    <div class="login-screen">
                        <h1><i class="fas fa-comment"></i> Timate</h1>
                        <p>вход по номеру телефона</p>
                        <div class="phone-row">
                            <select id="authCountryCode">
                                <option value="+7">🇷🇺 Россия (+7)</option>
                                <option value="+1">🇺🇸 США (+1)</option>
                                <option value="+44">🇬🇧 Великобритания (+44)</option>
                            </select>
                            <input type="tel" id="authPhone" placeholder="Номер телефона">
                        </div>
                        <input type="password" id="authPassword" placeholder="Пароль">
                        <button onclick="window.login()"><i class="fas fa-sign-in-alt"></i> Войти</button>
                        <div class="switch-mode" onclick="window.showRegister()"><i class="fas fa-user-plus"></i> Нет аккаунта? Зарегистрироваться</div>
                        <div id="authError" class="error"></div>
                    </div>
                `;
            }
            
            window.login = async function() {
                const phone = document.getElementById('authPhone').value;
                const password = document.getElementById('authPassword').value;
                const countryCode = document.getElementById('authCountryCode').value;
                const fullPhone = countryCode + phone.replace(/[^0-9]/g, '');
                const { data: user } = await supabaseClient.from('users').select('*').eq('phone', fullPhone).single();
                if (!user || user.password !== password) {
                    document.getElementById('authError').textContent = '❌ Неверный номер или пароль';
                    return;
                }
                currentUser = user;
                saveSession(currentUser);
                await supabaseClient.from('users').update({ status: 'online' }).eq('id', currentUser.id);
                await requestNotificationPermission();
                await loadMainScreen();
            };
            
            window.showRegister = async function() {
                document.getElementById('app').innerHTML = `
                    <div class="login-screen">
                        <h1><i class="fas fa-comment"></i> Timate</h1>
                        <p>регистрация</p>
                        <input type="text" id="regUsername" placeholder="Имя пользователя">
                        <input type="text" id="regDisplayName" placeholder="Отображаемое имя">
                        <div class="phone-row">
                            <select id="regCountryCode">
                                <option value="+7">🇷🇺 Россия (+7)</option>
                                <option value="+1">🇺🇸 США (+1)</option>
                                <option value="+44">🇬🇧 Великобритания (+44)</option>
                            </select>
                            <input type="tel" id="regPhone" placeholder="Номер телефона">
                        </div>
                        <input type="password" id="regPassword" placeholder="Пароль">
                        <input type="password" id="regConfirmPassword" placeholder="Повторите пароль">
                        <button onclick="window.register()"><i class="fas fa-user-check"></i> Зарегистрироваться</button>
                        <div class="switch-mode" onclick="showAuth()"><i class="fas fa-sign-in-alt"></i> Уже есть аккаунт? Войти</div>
                        <div id="regError" class="error"></div>
                    </div>
                `;
            };
            
            window.register = async function() {
                const username = document.getElementById('regUsername').value;
                const displayName = document.getElementById('regDisplayName').value;
                const phone = document.getElementById('regPhone').value;
                const password = document.getElementById('regPassword').value;
                const confirm = document.getElementById('regConfirmPassword').value;
                const countryCode = document.getElementById('regCountryCode').value;
                if (!username || !displayName || !phone || !password) {
                    document.getElementById('regError').textContent = '❌ Заполните все поля';
                    return;
                }
                if (password !== confirm) { document.getElementById('regError').textContent = '❌ Пароли не совпадают'; return; }
                if (password.length < 3) { document.getElementById('regError').textContent = '❌ Пароль минимум 3 символа'; return; }
                const fullPhone = countryCode + phone.replace(/[^0-9]/g, '');
                const { data: existing } = await supabaseClient.from('users').select('*').eq('phone', fullPhone).single();
                if (existing) { document.getElementById('regError').textContent = '❌ Номер уже зарегистрирован'; return; }
                const { data: newUser, error } = await supabaseClient.from('users').insert({
                    username, display_name: displayName, password, phone: fullPhone,
                    avatar_color: '#9b59b6', status: 'online', hide_phone: false, invisible_mode: false, avatar_url: null
                }).select().single();
                if (error) { document.getElementById('regError').textContent = '❌ Ошибка'; return; }
                currentUser = newUser; saveSession(currentUser);
                await requestNotificationPermission();
                await loadMainScreen();
            };
            
            async function loadMainScreen() {
                if (isMainScreenLoaded) return;
                isMainScreenLoaded = true;
                if (autoUpdateInterval) clearInterval(autoUpdateInterval);
                
                document.getElementById('app').innerHTML = `
                    <div class="timate-container">
                        <div class="sidebar">
                            <div class="sidebar-header"><h2><i class="fas fa-comment"></i> Timate</h2><p><i class="fas fa-leaf"></i> свободное общение</p></div>
                            <div class="current-user">
                                <div class="user-avatar"><i class="fas fa-user"></i></div>
                                <div class="user-info">
                                    <div class="user-name">${escapeHtml(currentUser.display_name || currentUser.username)}</div>
                                    <div class="user-status"><i class="fas fa-circle"></i> онлайн</div>
                                </div>
                                <button class="settings-btn" onclick="openSettings()"><i class="fas fa-cog"></i></button>
                                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                            </div>
                            <div class="search-box">
                                <i class="fas fa-search"></i>
                                <input type="text" id="searchInput" placeholder="Поиск...">
                            </div>
                            <div class="tabs">
                                <div class="tab active" onclick="switchTab('contacts')"><i class="fas fa-users"></i> Контакты</div>
                                <div class="tab" onclick="switchTab('users')"><i class="fas fa-globe"></i> Все пользователи</div>
                            </div>
                            <div id="contactsList" class="contacts-list"></div>
                            <div id="usersList" class="users-list" style="display: none;"></div>
                        </div>
                        <div class="chat-area" id="chatArea"><div class="empty-state"><i class="fas fa-comment"></i>Выберите контакт для общения</div></div>
                    </div>
                `;
                await loadContacts(); await loadAllUsers();
                startAutoUpdate();
            }
            
            async function loadContacts() {
                const { data: contacts } = await supabaseClient.from('contacts').select(`contact_id, nickname, users:contact_id(*)`).eq('user_id', currentUser.id);
                const container = document.getElementById('contactsList');
                if (!container) return;
                if (!contacts?.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-address-book"></i>Нет контактов</div>'; return; }
                container.innerHTML = contacts.map(c => {
                    const u = c.users;
                    return `<div class="contact-item" onclick="selectContact('${u.id}')" data-contact-id="${u.id}">
                        <div class="contact-avatar" style="background: ${u.avatar_color || '#9b59b6'}"><i class="fas fa-user"></i></div>
                        <div class="contact-info">
                            <div class="contact-name">${escapeHtml(c.nickname || u.display_name || u.username)}</div>
                            <div class="contact-status ${u.status === 'online' ? 'online' : 'offline'}"><i class="fas fa-circle"></i> ${u.status === 'online' ? 'онлайн' : 'офлайн'}</div>
                        </div>
                        <div class="contact-actions">
                            <button class="delete-contact-btn" onclick="event.stopPropagation(); deleteContact('${u.id}')" title="Удалить"><i class="fas fa-trash-alt"></i></button>
                            <button class="call-btn" onclick="event.stopPropagation(); startVoiceCall('${u.id}')" title="Голосовое сообщение"><i class="fas fa-microphone"></i></button>
                        </div>
                    </div>`;
                }).join('');
            }
            
            window.deleteContact = async function(contactId) {
                if (confirm('Удалить контакт?')) {
                    await supabaseClient.from('contacts').delete().eq('user_id', currentUser.id).eq('contact_id', contactId);
                    if (currentContact === contactId) { currentContact = null; document.getElementById('chatArea').innerHTML = '<div class="empty-state"><i class="fas fa-comment"></i>Выберите чат</div>'; }
                    await loadContacts(); showNotification('Контакт удалён');
                }
            };
            
            async function loadAllUsers() {
                const { data: users } = await supabaseClient.from('users').select('*').neq('id', currentUser.id);
                const container = document.getElementById('usersList');
                if (!container) return;
                if (!users?.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-globe"></i>Нет пользователей</div>'; return; }
                const { data: contacts } = await supabaseClient.from('contacts').select('contact_id').eq('user_id', currentUser.id);
                const contactIds = new Set(contacts?.map(c => c.contact_id) || []);
                container.innerHTML = users.map(u => `
                    <div class="user-item">
                        <div class="user-avatar-small" style="background: ${u.avatar_color || '#9b59b6'}"><i class="fas fa-user"></i></div>
                        <div class="user-info-small">
                            <div class="contact-name">${escapeHtml(u.display_name || u.username)}</div>
                        </div>
                        ${!contactIds.has(u.id) ? `<button class="add-btn" onclick="addContact('${u.id}')"><i class="fas fa-user-plus"></i> Добавить</button>` : '<span style="color:#8dc63f;"><i class="fas fa-check"></i> в контактах</span>'}
                    </div>
                `).join('');
            }
            
            window.addContact = async function(contactId) {
                await supabaseClient.from('contacts').insert({ user_id: currentUser.id, contact_id: contactId });
                showNotification('Контакт добавлен');
                await loadContacts(); await loadAllUsers();
            };
            
            window.startVoiceCall = function(contactId) {
                selectContact(contactId);
                setTimeout(() => {
                    const recordBtn = document.getElementById('voiceRecordBtn');
                    if (recordBtn) recordBtn.click();
                }, 500);
            };
            
            window.selectContact = async function(contactId) {
                currentContact = contactId;
                currentChat = null;
                document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
                const activeEl = document.querySelector(`.contact-item[data-contact-id="${contactId}"]`);
                if (activeEl) activeEl.classList.add('active');
                await loadMessages(contactId);
                await renderChat(contactId);
                lastMessagesMap.set(`private_${contactId}`, JSON.stringify(window.currentMessages));
            };
            
            async function loadMessages(contactId) {
                const [messages, voiceMessages] = await Promise.all([
                    supabaseClient.from('messages').select('*').or(`and(from_user_id.eq.${currentUser.id},to_user_id.eq.${contactId}),and(from_user_id.eq.${contactId},to_user_id.eq.${currentUser.id})`).order('created_at'),
                    supabaseClient.from('calls').select('*').or(`and(caller_id.eq.${currentUser.id},receiver_id.eq.${contactId}),and(caller_id.eq.${contactId},receiver_id.eq.${currentUser.id})`).order('created_at')
                ]);
                
                const allMessages = [
                    ...(messages.data || []).map(m => ({ ...m, type: 'text' })),
                    ...(voiceMessages.data || []).map(v => ({ ...v, type: 'voice', from_user_id: v.caller_id, to_user_id: v.receiver_id, content: v.text, audio_url: v.audio_url }))
                ];
                allMessages.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                window.currentMessages = allMessages;
            }
            
            async function renderChat(contactId) {
                const { data: contact } = await supabaseClient.from('users').select('*').eq('id', contactId).single();
                const chatArea = document.getElementById('chatArea');
                const messages = window.currentMessages || [];
                
                chatArea.innerHTML = `
                    <div class="chat-header">
                        <div class="chat-header-avatar" style="background: ${contact?.avatar_color || '#9b59b6'}"><i class="fas fa-user"></i></div>
                        <div class="chat-header-info">
                            <h3>${escapeHtml(contact?.display_name || contact?.username)}</h3>
                            <p><i class="fas fa-circle"></i> ${contact?.status === 'online' ? 'онлайн' : 'офлайн'}</p>
                        </div>
                    </div>
                    <div class="messages-container" id="messagesContainer">
                        ${messages.length === 0 ? '<div class="empty-state"><i class="fas fa-comment"></i>Нет сообщений</div>' : messages.map(msg => {
                            if (msg.type === 'voice') {
                                return `
                                    <div class="message ${msg.from_user_id === currentUser.id ? 'out' : 'in'}">
                                        <div class="message-bubble">
                                            <div class="voice-message" onclick="playVoiceMessage('${msg.audio_url}')">
                                                <div class="voice-play-btn"><i class="fas fa-play"></i></div>
                                                <div class="voice-wave">
                                                    <span></span><span></span><span></span><span></span><span></span>
                                                </div>
                                                <div class="voice-duration">${msg.duration || 0} сек</div>
                                            </div>
                                            ${msg.text ? `<div class="voice-text"><i class="fas fa-language"></i> ${escapeHtml(msg.text)}</div>` : ''}
                                            <div class="message-time"><i class="far fa-clock"></i> ${new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                                        </div>
                                    </div>
                                `;
                            } else {
                                return `
                                    <div class="message ${msg.from_user_id === currentUser.id ? 'out' : 'in'}">
                                        <div class="message-bubble">
                                            <div class="message-text">${escapeHtml(msg.content)}</div>
                                            <div class="message-time"><i class="far fa-clock"></i> ${new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                                        </div>
                                    </div>
                                `;
                            }
                        }).join('')}
                    </div>
                    <div class="input-area">
                        <input type="text" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendTextMessage()">
                        <button class="voice-record-btn" id="voiceRecordBtn" onclick="toggleVoiceRecording()"><i class="fas fa-microphone"></i></button>
                        <button class="send-btn" onclick="sendTextMessage()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                `;
                
                const container = document.getElementById('messagesContainer');
                if (container) container.scrollTop = container.scrollHeight;
            }
            
            window.toggleVoiceRecording = function() {
                if (!isRecording) {
                    startRecording();
                } else {
                    stopRecording();
                }
            };
            
            window.sendTextMessage = async function() {
                const input = document.getElementById('messageInput');
                const content = input.value.trim();
                if (!content || !currentContact) return;
                await supabaseClient.from('messages').insert({ from_user_id: currentUser.id, to_user_id: currentContact, content });
                input.value = '';
                await loadMessages(currentContact);
                await renderChat(currentContact);
                lastMessagesMap.set(`private_${currentContact}`, JSON.stringify(window.currentMessages));
            };
            
            window.playVoiceMessage = function(audioUrl) {
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio = null;
                }
                const audio = new Audio(audioUrl);
                currentAudio = audio;
                audio.play();
                audio.onended = () => { currentAudio = null; };
            };
            
            function startAutoUpdate() {
                if (autoUpdateInterval) clearInterval(autoUpdateInterval);
                autoUpdateInterval = setInterval(async () => {
                    if (currentContact) {
                        await loadMessages(currentContact);
                        const currentString = JSON.stringify(window.currentMessages);
                        const lastString = lastMessagesMap.get(`private_${currentContact}`) || '';
                        if (currentString !== lastString) {
                            lastMessagesMap.set(`private_${currentContact}`, currentString);
                            await renderChat(currentContact);
                            
                            const newMessages = window.currentMessages || [];
                            const oldMessages = lastString ? JSON.parse(lastString) : [];
                            if (newMessages.length > oldMessages.length) {
                                const lastMsg = newMessages[newMessages.length - 1];
                                if (lastMsg && lastMsg.from_user_id !== currentUser.id) {
                                    const { data: sender } = await supabaseClient.from('users').select('display_name').eq('id', lastMsg.from_user_id).single();
                                    sendPushNotification(`💬 ${sender?.display_name || 'Пользователь'}`, lastMsg.content || '🎤 Голосовое сообщение');
                                }
                            }
                        }
                    }
                }, 300);
            }
            
            window.switchTab = function(tab) {
                const contactsList = document.getElementById('contactsList');
                const usersList = document.getElementById('usersList');
                const tabs = document.querySelectorAll('.tab');
                tabs.forEach((t, i) => {
                    t.classList.remove('active');
                    if ((tab === 'contacts' && i === 0) || (tab === 'users' && i === 1)) t.classList.add('active');
                });
                if (tab === 'contacts') { contactsList.style.display = 'block'; usersList.style.display = 'none'; }
                else { contactsList.style.display = 'none'; usersList.style.display = 'block'; loadAllUsers(); }
            };
            
            window.openSettings = function() {
                alert('⚙️ Настройки профиля в разработке');
            };
            
            window.logout = async function() {
                if (currentUser) await supabaseClient.from('users').update({ status: 'offline' }).eq('id', currentUser.id);
                if (autoUpdateInterval) clearInterval(autoUpdateInterval);
                clearSession(); currentUser = null; currentContact = null;
                isMainScreenLoaded = false;
                showAuth();
            };
            
            function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        })();
    </script>
</body>
</html>
