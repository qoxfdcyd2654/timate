// Замени функцию callGemini на эту:
async function callGemini(prompt) {
    try {
        // Используем CORS-прокси для обхода блокировок
        const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`;
        
        const response = await fetch(proxyUrl + apiUrl, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Origin': window.location.origin
            },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
            })
        });
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        if (data.candidates && data.candidates[0] && data.candidates[0].content) {
            return data.candidates[0].content.parts[0].text;
        }
        return 'Извините, не могу ответить на этот вопрос.';
    } catch (error) {
        console.error('Gemini API error:', error);
        return '❌ Ошибка связи с нейросетью. Возможно, API временно недоступен в вашем регионе. Попробуйте позже или используйте VPN.';
    }
}

                        <p>регистрация</p>
                        <input type="text" id="regUsername" placeholder="Имя пользователя">
                        <input type="text" id="regDisplayName" placeholder="Отображаемое имя">
                        <textarea id="regBio" rows="2" placeholder="О себе"></textarea>
                        <div class="phone-row">
                            <select id="regCountryCode">
                                <option value="+7">🇷🇺 Россия (+7)</option>
                                <option value="+1">🇺🇸 США (+1)</option>
                                <option value="+44">🇬🇧 Великобритания (+44)</option>
                            </select>
                            <input type="tel" id="regPhone" placeholder="Номер телефона">
                        </div>
                        <input type="password" id="regPassword" placeholder="Пароль">
                        <input type="password" id="regConfirmPassword" placeholder="Повторите пароль">
                        <button onclick="window.register()"><i class="fas fa-user-check"></i> Зарегистрироваться</button>
                        <div class="switch-mode" onclick="showAuth()"><i class="fas fa-sign-in-alt"></i> Уже есть аккаунт? Войти</div>
                        <div class="privacy-link" onclick="showPrivacyPolicy()"><i class="fas fa-file-contract"></i> <span>Политика конфиденциальности</span></div>
                        <div id="regError" class="error"></div>
                    </div>
                `;
            };
            
            window.register = async function() {
                const username = document.getElementById('regUsername').value;
                const displayName = document.getElementById('regDisplayName').value;
                const bio = document.getElementById('regBio').value;
                const phone = document.getElementById('regPhone').value;
                const password = document.getElementById('regPassword').value;
                const confirm = document.getElementById('regConfirmPassword').value;
                const countryCode = document.getElementById('regCountryCode').value;
                if (!username || !displayName || !phone || !password) {
                    document.getElementById('regError').textContent = '❌ Заполните все поля';
                    return;
                }
                if (password !== confirm) { document.getElementById('regError').textContent = '❌ Пароли не совпадают'; return; }
                if (password.length < 3) { document.getElementById('regError').textContent = '❌ Пароль минимум 3 символа'; return; }
                const fullPhone = countryCode + phone.replace(/[^0-9]/g, '');
                const { data: existing } = await supabaseClient.from('users').select('*').eq('phone', fullPhone).single();
                if (existing) { document.getElementById('regError').textContent = '❌ Номер уже зарегистрирован'; return; }
                const { data: newUser, error } = await supabaseClient.from('users').insert({
                    username, display_name: displayName, password, phone: fullPhone, bio,
                    avatar_color: '#9b59b6', status: 'online', hide_phone: false, invisible_mode: false, avatar_url: null
                }).select().single();
                if (error) { document.getElementById('regError').textContent = '❌ Ошибка'; return; }
                currentUser = newUser; saveSession(currentUser);
                await createGeminiChannelIfNotExists();
                await addUserToGeminiChannel();
                await loadMainScreen();
            };
            
            // Функция загрузки аватарки
            async function uploadAvatar(file) {
                if (!file) return;
                const fileName = `${currentUser.id}_${Date.now()}.png`;
                const { data, error } = await supabaseClient.storage.from('avatars').upload(fileName, file);
                if (error) { console.error('Upload error:', error); return null; }
                const { data: urlData } = supabaseClient.storage.from('avatars').getPublicUrl(fileName);
                return urlData.publicUrl;
            }
            
            async function loadMainScreen() {
                if (isMainScreenLoaded) return;
                isMainScreenLoaded = true;
                
                if (autoUpdateInterval) clearInterval(autoUpdateInterval);
                
                const avatarUrl = currentUser.avatar_url || '';
                const avatarHtml = avatarUrl ? `<img src="${avatarUrl}" alt="avatar">` : `<i class="fas fa-user"></i>`;
                
                document.getElementById('app').innerHTML = `
                    <div class="timate-container">
                        <div class="sidebar">
                            <div class="sidebar-header"><h2><i class="fas fa-comment"></i> Timate</h2><p><i class="fas fa-leaf"></i> свободное общение</p></div>
                            <div class="current-user">
                                <div class="user-avatar" onclick="document.getElementById('avatarInput').click()" style="cursor:pointer;">${avatarHtml}</div>
                                <input type="file" id="avatarInput" style="display:none;" accept="image/*" onchange="uploadNewAvatar(this)">
                                <div class="user-info">
                                    <div class="user-name">${escapeHtml(currentUser.display_name || currentUser.username)}</div>
                                    <div class="user-status"><i class="fas fa-circle"></i> онлайн</div>
                                    ${!currentUser.hide_phone ? `<div class="user-phone"><i class="fas fa-phone"></i> ${escapeHtml(currentUser.phone || '')}</div>` : ''}
                                    ${currentUser.bio ? `<div class="user-bio"><i class="fas fa-quote-left"></i> ${escapeHtml(currentUser.bio)}</div>` : ''}
                                </div>
                                <button class="settings-btn" onclick="openSettings()"><i class="fas fa-cog"></i></button>
                                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                            </div>
                            <button class="create-chat-btn" onclick="showCreateChatModal()"><i class="fas fa-plus-circle"></i> Создать группу/канал</button>
                            <div class="search-box">
                                <i class="fas fa-search"></i>
                                <input type="text" id="searchInput" placeholder="Поиск..." oninput="searchAll()">
                            </div>
                            <div class="tabs">
                                <div class="tab ${activeTab === 'contacts' ? 'active' : ''}" onclick="switchTab('contacts')"><i class="fas fa-users"></i> Контакты</div>
                                <div class="tab ${activeTab === 'users' ? 'active' : ''}" onclick="switchTab('users')"><i class="fas fa-globe"></i> Все пользователи</div>
                                <div class="tab ${activeTab === 'chats' ? 'active' : ''}" onclick="switchTab('chats')"><i class="fas fa-layer-group"></i> Мои чаты</div>
                                <div class="tab ${activeTab === 'public' ? 'active' : ''}" onclick="switchTab('public')"><i class="fas fa-globe"></i> Публичные каналы</div>
                            </div>
                            <div id="contactsList" class="contacts-list"></div>
                            <div id="usersList" class="users-list" style="display: none;"></div>
                            <div id="chatsList" class="chats-list" style="display: none;"></div>
                            <div id="publicChannelsList" class="public-channels-list" style="display: none;"></div>
                        </div>
                        <div class="chat-area" id="chatArea"><div class="empty-state"><i class="fas fa-comment"></i>Выберите чат для общения</div></div>
                    </div>
                `;
                
                await loadContacts(); 
                await loadAllUsers(); 
                await loadMyChats(); 
                await loadPublicChannels();
                
                document.getElementById('contactsList').style.display = activeTab === 'contacts' ? 'block' : 'none';
                document.getElementById('usersList').style.display = activeTab === 'users' ? 'block' : 'none';
                document.getElementById('chatsList').style.display = activeTab === 'chats' ? 'block' : 'none';
                document.getElementById('publicChannelsList').style.display = activeTab === 'public' ? 'block' : 'none';
                
                startAutoUpdate();
            }
            
            window.uploadNewAvatar = async function(input) {
                if (input.files && input.files[0]) {
                    const url = await uploadAvatar(input.files[0]);
                    if (url) {
                        const { error } = await supabaseClient.from('users').update({ avatar_url: url }).eq('id', currentUser.id);
                        if (!error) {
                            currentUser.avatar_url = url;
                            saveSession(currentUser);
                            showNotification('Аватар обновлён');
                            await loadMainScreen();
                        }
                    }
                }
            };
            
            async function loadContacts() {
                const { data: contacts } = await supabaseClient.from('contacts').select(`contact_id, nickname, users:contact_id(*)`).eq('user_id', currentUser.id);
                const container = document.getElementById('contactsList');
                if (!container) return;
                if (!contacts?.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-address-book"></i>Нет контактов</div>'; return; }
                container.innerHTML = contacts.map(c => {
                    const u = c.users;
                    const avatarHtml = u.avatar_url ? `<img src="${u.avatar_url}" alt="avatar">` : `<i class="fas fa-user"></i>`;
                    return `<div class="contact-item" onclick="selectContact('${u.id}')" data-contact-id="${u.id}">
                        <div class="contact-avatar" style="background: ${u.avatar_color || '#9b59b6'}">${avatarHtml}</div>
                        <div class="contact-info">
                            <div class="contact-name">${escapeHtml(c.nickname || u.display_name || u.username)}</div>
                            <div class="contact-status ${u.status === 'online' ? 'online' : 'offline'}"><i class="fas fa-circle"></i> ${u.status === 'online' ? 'онлайн' : 'офлайн'}</div>
                            ${!u.hide_phone && u.phone ? `<div class="contact-phone"><i class="fas fa-phone"></i> ${escapeHtml(u.phone)}</div>` : ''}
                            ${u.bio ? `<div class="contact-bio">${escapeHtml(u.bio.substring(0, 40))}</div>` : ''}
                        </div>
                        <div class="contact-actions">
                            <button class="delete-contact-btn" onclick="event.stopPropagation(); deleteContact('${u.id}')" title="Удалить"><i class="fas fa-trash-alt"></i></button>
                            <button class="call-btn" onclick="event.stopPropagation(); startCall('${u.id}', 'audio')"><i class="fas fa-phone"></i></button>
                            <button class="call-btn" onclick="event.stopPropagation(); startCall('${u.id}', 'video')"><i class="fas fa-video"></i></button>
                        </div>
                    </div>`;
                }).join('');
            }
            
            window.deleteContact = async function(contactId) {
                if (confirm('Удалить контакт?')) {
                    await supabaseClient.from('contacts').delete().eq('user_id', currentUser.id).eq('contact_id', contactId);
                    if (currentContact === contactId) { currentContact = null; document.getElementById('chatArea').innerHTML = '<div class="empty-state"><i class="fas fa-comment"></i>Выберите чат</div>'; }
                    await loadContacts(); showNotification('Контакт удалён');
                }
            };
            
            async function loadAllUsers() {
                let query = supabaseClient.from('users').select('*').neq('id', currentUser.id);
                if (currentUser.invisible_mode) query = query.eq('invisible_mode', false);
                const { data: users } = await query;
                const container = document.getElementById('usersList');
                if (!container) return;
                if (!users?.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-globe"></i>Нет пользователей</div>'; return; }
                const { data: contacts } = await supabaseClient.from('contacts').select('contact_id').eq('user_id', currentUser.id);
                const contactIds = new Set(contacts?.map(c => c.contact_id) || []);
                container.innerHTML = users.map(u => {
                    const avatarHtml = u.avatar_url ? `<img src="${u.avatar_url}" alt="avatar">` : `<i class="fas fa-user"></i>`;
                    return `<div class="user-item">
                        <div class="user-avatar-small" style="background: ${u.avatar_color || '#9b59b6'}">${avatarHtml}</div>
                        <div class="user-info-small">
                            <div class="contact-name">${escapeHtml(u.display_name || u.username)}</div>
                            ${!u.hide_phone && u.phone ? `<div><i class="fas fa-phone"></i> ${escapeHtml(u.phone)}</div>` : ''}
                            ${u.bio ? `<div style="font-size:10px;color:#666;"><i class="fas fa-quote-left"></i> ${escapeHtml(u.bio.substring(0, 40))}</div>` : ''}
                        </div>
                        ${!contactIds.has(u.id) ? `<button class="add-btn" onclick="showAddContactModal('${u.id}', '${escapeHtml(u.display_name || u.username)}')"><i class="fas fa-user-plus"></i> Добавить</button>` : '<span style="color:#8dc63f;"><i class="fas fa-check"></i> в контактах</span>'}
                    </div>`;
                }).join('');
            }
            
            window.showAddContactModal = function(userId, userName) {
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3><i class="fas fa-user-plus"></i> Добавить контакт</h3>
                        <p>Вы хотите добавить <strong>${escapeHtml(userName)}</strong> в свой список контактов?</p>
                        <div class="checkbox-row">
                            <input type="text" id="contactNickname" placeholder="Прозвище (необязательно)">
                        </div>
                        <button class="save-btn" onclick="window.confirmAddContact('${userId}', document.getElementById('contactNickname').value)"><i class="fas fa-check"></i> Добавить</button>
                        <button class="cancel-btn" onclick="this.closest('.modal').remove()"><i class="fas fa-times"></i> Отмена</button>
                    </div>
                `;
                document.body.appendChild(modal);
            };
            
            window.confirmAddContact = async function(userId, nickname) {
                await supabaseClient.from('contacts').insert({ user_id: currentUser.id, contact_id: userId, nickname: nickname || null });
                showNotification('Контакт добавлен');
                document.querySelector('.modal')?.remove();
                await loadContacts(); 
                await loadAllUsers();
            };
            
            async function loadMyChats() {
                const { data: memberships } = await supabaseClient.from('chat_members').select('chat_id, chats(*)').eq('user_id', currentUser.id);
                const container = document.getElementById('chatsList');
                if (!container) return;
                if (!memberships?.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-layer-group"></i>Нет групп/каналов</div>'; return; }
                container.innerHTML = memberships.map(m => {
                    const chat = m.chats;
                    const typeIcon = chat.type === 'group' ? '<i class="fas fa-users"></i>' : '<i class="fas fa-broadcast-tower"></i>';
                    return `<div class="chat-item" onclick="selectChat('${chat.id}', '${chat.type}')" data-chat-id="${chat.id}">
                        <div class="chat-avatar" style="background: ${chat.avatar_color || '#8dc63f'}">${typeIcon}</div>
                        <div class="chat-info">
                            <div class="chat-name">${escapeHtml(chat.name)}</div>
                            <div class="chat-type"><i class="fas ${chat.type === 'group' ? 'fa-users' : 'fa-broadcast-tower'}"></i> ${chat.type === 'group' ? 'Группа' : (chat.is_private ? 'Приватный канал' : 'Публичный канал')}</div>
                        </div>
                    </div>`;
                }).join('');
            }
            
            async function loadPublicChannels() {
                const { data: channels } = await supabaseClient.from('chats').select('*').eq('type', 'channel').eq('is_private', false);
                const container = document.getElementById('publicChannelsList');
                if (!container) return;
                if (!channels?.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-globe"></i>Нет публичных каналов</div>'; return; }
                const { data: memberships } = await supabaseClient.from('chat_members').select('chat_id').eq('user_id', currentUser.id);
                const myChatIds = new Set(memberships?.map(m => m.chat_id) || []);
                container.innerHTML = channels.map(ch => `
                    <div class="channel-item" onclick="joinPublicChannel('${ch.id}')">
                        <div class="channel-avatar" style="background: ${ch.avatar_color || '#8dc63f'}"><i class="fas fa-broadcast-tower"></i></div>
                        <div class="chat-info">
                            <div class="chat-name">${escapeHtml(ch.name)}</div>
                            <div class="chat-type"><i class="fas fa-globe"></i> Публичный канал</div>
                            ${ch.description ? `<div style="font-size:10px;color:#666;">${escapeHtml(ch.description.substring(0, 50))}</div>` : ''}
                        </div>
                        ${!myChatIds.has(ch.id) ? `<button class="join-btn" onclick="event.stopPropagation(); joinPublicChannel('${ch.id}')" title="Подписаться"><i class="fas fa-plus-circle"></i></button>` : '<span style="color:#8dc63f;"><i class="fas fa-check"></i> подписан</span>'}
                    </div>
                `).join('');
            }
            
            window.joinPublicChannel = async function(chatId) {
                const { error } = await supabaseClient.from('chat_members').insert({ chat_id: chatId, user_id: currentUser.id, role: 'member' });
                if (!error) {
                    showNotification('Вы подписались на канал');
                    await loadMyChats();
                    if (activeTab === 'public') loadPublicChannels();
                } else {
                    showNotification('Ошибка подписки');
                }
            };
            
            window.selectContact = async function(contactId) {
                currentContact = contactId; 
                currentChat = null;
                document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
                const activeEl = document.querySelector(`.contact-item[data-contact-id="${contactId}"]`);
                if (activeEl) activeEl.classList.add('active');
                await loadPrivateMessages(contactId);
                await renderPrivateChat(contactId);
                lastMessagesString = JSON.stringify(window.currentMessages);
            };
            
            window.selectChat = async function(chatId, type) {
                currentChat = chatId; 
                currentContact = null; 
                currentChatType = type;
                document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
                const activeEl = document.querySelector(`.chat-item[data-chat-id="${chatId}"]`);
                if (activeEl) activeEl.classList.add('active');
                await loadGroupMessages(chatId);
                await renderGroupChat(chatId);
                lastMessagesString = JSON.stringify(window.currentMessages);
            };
            
            async function loadPrivateMessages(contactId) {
                const { data: messages } = await supabaseClient.from('messages').select('*').or(`and(from_user_id.eq.${currentUser.id},to_user_id.eq.${contactId}),and(from_user_id.eq.${contactId},to_user_id.eq.${currentUser.id})`).order('created_at');
                window.currentMessages = messages || [];
                await supabaseClient.from('messages').update({ is_read: true }).eq('from_user_id', contactId).eq('to_user_id', currentUser.id).eq('is_read', false);
            }
            
            async function loadGroupMessages(chatId) {
                const { data: messages } = await supabaseClient.from('messages').select('*, users:from_user_id(username, display_name)').eq('chat_id', chatId).order('created_at');
                window.currentMessages = messages || [];
            }
            
            async function renderPrivateChat(contactId) {
                const { data: contact } = await supabaseClient.from('users').select('*').eq('id', contactId).single();
                const chatArea = document.getElementById('chatArea');
                const messages = window.currentMessages || [];
                const avatarHtml = contact?.avatar_url ? `<img src="${contact.avatar_url}" alt="avatar">` : `<i class="fas fa-user"></i>`;
                chatArea.innerHTML = `
                    <div class="chat-header">
                        <div class="chat-header-avatar" style="background: ${contact?.avatar_color || '#9b59b6'}">${avatarHtml}</div>
                        <div class="chat-header-info">
                            <h3>${escapeHtml(contact?.display_name || contact?.username)}</h3>
                            <p><i class="fas fa-circle"></i> ${contact?.status === 'online' ? 'онлайн' : 'офлайн'}</p>
                            ${!contact?.hide_phone && contact?.phone ? `<div class="phone"><i class="fas fa-phone"></i> ${escapeHtml(contact.phone)}</div>` : ''}
                            ${contact?.bio ? `<div class="bio"><i class="fas fa-quote-left"></i> ${escapeHtml(contact.bio)}</div>` : ''}
                        </div>
                        <div class="chat-actions">
                            <button onclick="startCall('${contactId}', 'audio')"><i class="fas fa-phone"></i> Аудио</button>
                            <button onclick="startCall('${contactId}', 'video')"><i class="fas fa-video"></i> Видео</button>
                        </div>
                    </div>
                    <div class="messages-container" id="messagesContainer">
                        ${messages.length === 0 ? '<div class="empty-state"><i class="fas fa-comment"></i>Нет сообщений</div>' : messages.map(msg => `
                            <div class="message ${msg.from_user_id === currentUser.id ? 'out' : 'in'}">
                                <div class="message-bubble">
                                    <div class="message-text">${escapeHtml(msg.content)}</div>
                                    <div class="message-time"><i class="far fa-clock"></i> ${new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="input-area">
                        <input type="text" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendPrivateMessage()">
                        <button onclick="sendPrivateMessage()"><i class="fas fa-paper-plane"></i> Отправить</button>
                    </div>
                `;
                const container = document.getElementById('messagesContainer');
                if (container) container.scrollTop = container.scrollHeight;
            }
            
            async function renderGroupChat(chatId) {
                const { data: chat } = await supabaseClient.from('chats').select('*').eq('id', chatId).single();
                const chatArea = document.getElementById('chatArea');
                const messages = window.currentMessages || [];
                const typeIcon = chat.type === 'group' ? '<i class="fas fa-users"></i>' : '<i class="fas fa-broadcast-tower"></i>';
                
                // Специальная обработка для канала Gemini
                const isGeminiChannel = chat.id === GEMINI_CHAT_ID;
                
                chatArea.innerHTML = `
                    <div class="chat-header">
                        <div class="chat-header-avatar" style="background: ${chat.avatar_color || '#8dc63f'}">${typeIcon}</div>
                        <div class="chat-header-info">
                            <h3>${escapeHtml(chat.name)} ${isGeminiChannel ? '<span style="font-size:12px;color:#4285f4;">🤖 AI</span>' : ''}</h3>
                            <p><i class="fas fa-circle"></i> ${chat.type === 'group' ? 'Группа' : (chat.is_private ? 'Приватный канал' : 'Публичный канал')}</p>
                            ${chat.description ? `<div class="bio"><i class="fas fa-info-circle"></i> ${escapeHtml(chat.description)}</div>` : ''}
                        </div>
                        <div class="chat-actions">
                            ${chat.type === 'channel' && chat.is_private ? `<button onclick="inviteToChannelModal('${chat.id}')"><i class="fas fa-user-plus"></i> Пригласить</button>` : ''}
                        </div>
                    </div>
                    <div class="messages-container" id="messagesContainer">
                        ${messages.length === 0 ? '<div class="empty-state"><i class="fas fa-comment"></i>Нет сообщений</div>' : messages.map(msg => `
                            <div class="message ${msg.from_user_id === currentUser.id ? 'out' : 'in'}">
                                <div class="message-bubble">
                                    ${msg.from_user_id !== currentUser.id ? `<div class="message-sender"><i class="fas fa-user"></i> ${escapeHtml(msg.users?.display_name || msg.users?.username)}</div>` : ''}
                                    <div class="message-text">${escapeHtml(msg.content)}</div>
                                    <div class="message-time"><i class="far fa-clock"></i> ${new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="input-area">
                        <input type="text" id="messageInput" placeholder="${isGeminiChannel ? 'Задайте вопрос нейросети Gemini...' : 'Сообщение...'}" onkeypress="if(event.key==='Enter') sendGroupMessage()">
                        <button onclick="sendGroupMessage()"><i class="fas fa-paper-plane"></i> Отправить</button>
                    </div>
                `;
                const container = document.getElementById('messagesContainer');
                if (container) container.scrollTop = container.scrollHeight;
            }
            
            window.sendPrivateMessage = async function() {
                const input = document.getElementById('messageInput');
                const content = input.value.trim();
                if (!content || !currentContact) return;
                await supabaseClient.from('messages').insert({ from_user_id: currentUser.id, to_user_id: currentContact, content });
                input.value = '';
                await loadPrivateMessages(currentContact);
                await renderPrivateChat(currentContact);
                lastMessagesString = JSON.stringify(window.currentMessages);
            };
            
window.sendGroupMessage = async function() {
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    if (!content || !currentChat) return;
    
    // Сохраняем сообщение пользователя
    await supabaseClient.from('messages').insert({ 
        from_user_id: currentUser.id, 
        chat_id: currentChat, 
        content: content 
    });
    
    input.value = '';
    await loadGroupMessages(currentChat);
    await renderGroupChat(currentChat);
    lastMessagesString = JSON.stringify(window.currentMessages);
};
            
            window.inviteToChannelModal = function(chatId) {
                const username = prompt('Введите имя пользователя для приглашения:');
                if (username) inviteToChannel(chatId, username);
            };
            
            window.inviteToChannel = async function(chatId, userName) {
                const { data: users } = await supabaseClient.from('users').select('id, username, display_name').ilike('username', `%${userName}%`).limit(10);
                if (!users?.length) { alert('Пользователь не найден'); return; }
                let targetUser = users[0];
                if (users.length > 1) {
                    const list = users.map(u => `${u.username} - ${u.display_name}`).join('\n');
                    const selected = prompt(`Найдено несколько пользователей:\n${list}\nВведите точное имя:`);
                    targetUser = users.find(u => u.username === selected || u.display_name === selected);
                    if (!targetUser) { alert('Пользователь не выбран'); return; }
                }
                if (confirm(`Пригласить ${targetUser.display_name || targetUser.username} в канал?`)) {
                    const { error } = await supabaseClient.from('chat_members').insert({ chat_id: chatId, user_id: targetUser.id, role: 'member' });
                    if (!error) showNotification('Приглашение отправлено');
                    else showNotification('Ошибка: возможно, пользователь уже в канале');
                }
            };
            
            window.showCreateChatModal = function() {
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3><i class="fas fa-plus-circle"></i> Создать чат</h3>
                        <select id="chatType">
                            <option value="group"><i class="fas fa-users"></i> Группа (приватная)</option>
                            <option value="channel"><i class="fas fa-broadcast-tower"></i> Канал</option>
                        </select>
                        <div id="privacyOption" style="display:none;">
                            <div class="checkbox-row"><input type="checkbox" id="isPrivate"><label><i class="fas fa-lock"></i> Приватный канал</label></div>
                        </div>
                        <input type="text" id="chatName" placeholder="Название">
                        <textarea id="chatDescription" rows="2" placeholder="Описание"></textarea>
                        <button class="save-btn" onclick="createChat()"><i class="fas fa-save"></i> Создать</button>
                        <button class="cancel-btn" onclick="this.closest('.modal').remove()"><i class="fas fa-times"></i> Отмена</button>
                    </div>
                `;
                document.body.appendChild(modal);
                document.getElementById('chatType').onchange = function() {
                    document.getElementById('privacyOption').style.display = this.value === 'channel' ? 'block' : 'none';
                };
            };
            
            window.createChat = async function() {
                const type = document.getElementById('chatType').value;
                const name = document.getElementById('chatName').value.trim();
                const description = document.getElementById('chatDescription').value.trim();
                const isPrivate = type === 'channel' ? document.getElementById('isPrivate')?.checked : true;
                if (!name) { alert('Введите название'); return; }
                const { data: chat, error } = await supabaseClient.from('chats').insert({
                    name, type, is_private: isPrivate, description, avatar_color: '#8dc63f', created_by: currentUser.id
                }).select().single();
                if (error) { alert('Ошибка'); return; }
                document.querySelector('.modal')?.remove();
                showNotification(`${type === 'group' ? 'Группа' : 'Канал'} "${name}" создан`);
                await loadMyChats();
                if (activeTab === 'chats') switchTab('chats');
            };
            
            function startAutoUpdate() {
                if (autoUpdateInterval) clearInterval(autoUpdateInterval);
                autoUpdateInterval = setInterval(async () => {
                    if (currentContact) {
                        const { data: messages } = await supabaseClient.from('messages').select('*').or(`and(from_user_id.eq.${currentUser.id},to_user_id.eq.${currentContact}),and(from_user_id.eq.${currentContact},to_user_id.eq.${currentUser.id})`).order('created_at');
                        const currentString = JSON.stringify(messages);
                        if (currentString !== lastMessagesString) {
                            lastMessagesString = currentString;
                            window.currentMessages = messages || [];
                            await renderPrivateChat(currentContact);
                        }
                    } else if (currentChat) {
                        const { data: messages } = await supabaseClient.from('messages').select('*, users:from_user_id(username, display_name)').eq('chat_id', currentChat).order('created_at');
                        const currentString = JSON.stringify(messages);
                        if (currentString !== lastMessagesString) {
                            lastMessagesString = currentString;
                            window.currentMessages = messages || [];
                            await renderGroupChat(currentChat);
                        }
                    }
                }, 300);
            }
            
            window.searchAll = async function() {
                const query = document.getElementById('searchInput').value.toLowerCase();
                if (activeTab === 'users') {
                    if (!query) { loadAllUsers(); return; }
                    let dbQuery = supabaseClient.from('users').select('*').neq('id', currentUser.id);
                    if (currentUser.invisible_mode) dbQuery = dbQuery.eq('invisible_mode', false);
                    const { data: users } = await dbQuery.or(`username.ilike.%${query}%,display_name.ilike.%${query}%${!currentUser.hide_phone ? `,phone.ilike.%${query}%` : ''}`);
                    const container = document.getElementById('usersList');
                    if (!container) return;
                    if (!users?.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i>Ничего не найдено</div>'; return; }
                    const { data: contacts } = await supabaseClient.from('contacts').select('contact_id').eq('user_id', currentUser.id);
                    const contactIds = new Set(contacts?.map(c => c.contact_id) || []);
                    container.innerHTML = users.map(u => {
                        const avatarHtml = u.avatar_url ? `<img src="${u.avatar_url}" alt="avatar">` : `<i class="fas fa-user"></i>`;
                        return `<div class="user-item">
                            <div class="user-avatar-small" style="background: ${u.avatar_color || '#9b59b6'}">${avatarHtml}</div>
                            <div class="user-info-small">
                                <div class="contact-name">${escapeHtml(u.display_name || u.username)}</div>
                                ${!u.hide_phone && u.phone ? `<div><i class="fas fa-phone"></i> ${escapeHtml(u.phone)}</div>` : ''}
                            </div>
                            ${!contactIds.has(u.id) ? `<button class="add-btn" onclick="showAddContactModal('${u.id}', '${escapeHtml(u.display_name || u.username)}')"><i class="fas fa-user-plus"></i> Добавить</button>` : '<span><i class="fas fa-check"></i> в контактах</span>'}
                        </div>`;
                    }).join('');
                } else if (activeTab === 'contacts') {
                    if (!query) { loadContacts(); return; }
                    const { data: contacts } = await supabaseClient.from('contacts').select(`contact_id, nickname, users:contact_id(*)`).eq('user_id', currentUser.id);
                    const filtered = contacts?.filter(c => (c.nickname || c.users.display_name || c.users.username).toLowerCase().includes(query)) || [];
                    const container = document.getElementById('contactsList');
                    if (!container) return;
                    if (!filtered.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i>Ничего не найдено</div>'; return; }
                    container.innerHTML = filtered.map(c => {
                        const u = c.users;
                        const avatarHtml = u.avatar_url ? `<img src="${u.avatar_url}" alt="avatar">` : `<i class="fas fa-user"></i>`;
                        return `<div class="contact-item" onclick="selectContact('${u.id}')" data-contact-id="${u.id}">
                            <div class="contact-avatar" style="background: ${u.avatar_color || '#9b59b6'}">${avatarHtml}</div>
                            <div class="contact-info"><div class="contact-name">${escapeHtml(c.nickname || u.display_name || u.username)}</div></div>
                        </div>`;
                    }).join('');
                } else if (activeTab === 'chats') {
                    if (!query) { loadMyChats(); return; }
                    const { data: memberships } = await supabaseClient.from('chat_members').select('chat_id, chats(*)').eq('user_id', currentUser.id);
                    const filtered = memberships?.filter(m => m.chats.name.toLowerCase().includes(query)) || [];
                    const container = document.getElementById('chatsList');
                    if (!container) return;
                    if (!filtered.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i>Ничего не найдено</div>'; return; }
                    container.innerHTML = filtered.map(m => {
                        const chat = m.chats;
                        const typeIcon = chat.type === 'group' ? '<i class="fas fa-users"></i>' : '<i class="fas fa-broadcast-tower"></i>';
                        return `<div class="chat-item" onclick="selectChat('${chat.id}', '${chat.type}')" data-chat-id="${chat.id}">
                            <div class="chat-avatar" style="background: ${chat.avatar_color || '#8dc63f'}">${typeIcon}</div>
                            <div class="chat-info"><div class="chat-name">${escapeHtml(chat.name)}</div></div>
                        </div>`;
                    }).join('');
                } else if (activeTab === 'public') {
                    if (!query) { loadPublicChannels(); return; }
                    const { data: channels } = await supabaseClient.from('chats').select('*').eq('type', 'channel').eq('is_private', false).ilike('name', `%${query}%`);
                    const container = document.getElementById('publicChannelsList');
                    if (!container) return;
                    if (!channels?.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i>Ничего не найдено</div>'; return; }
                    const { data: memberships } = await supabaseClient.from('chat_members').select('chat_id').eq('user_id', currentUser.id);
                    const myChatIds = new Set(memberships?.map(m => m.chat_id) || []);
                    container.innerHTML = channels.map(ch => `
                        <div class="channel-item" onclick="joinPublicChannel('${ch.id}')">
                            <div class="channel-avatar" style="background: ${ch.avatar_color || '#8dc63f'}"><i class="fas fa-broadcast-tower"></i></div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(ch.name)}</div>
                                <div class="chat-type"><i class="fas fa-globe"></i> Публичный канал</div>
                                ${ch.description ? `<div style="font-size:10px;color:#666;">${escapeHtml(ch.description.substring(0, 50))}</div>` : ''}
                            </div>
                            ${!myChatIds.has(ch.id) ? `<button class="join-btn" onclick="event.stopPropagation(); joinPublicChannel('${ch.id}')" title="Подписаться"><i class="fas fa-plus-circle"></i></button>` : '<span><i class="fas fa-check"></i> подписан</span>'}
                        </div>
                    `).join('');
                }
            };
            
            window.switchTab = function(tab) {
                activeTab = tab;
                const contactsList = document.getElementById('contactsList');
                const usersList = document.getElementById('usersList');
                const chatsList = document.getElementById('chatsList');
                const publicList = document.getElementById('publicChannelsList');
                
                if (contactsList) contactsList.style.display = tab === 'contacts' ? 'block' : 'none';
                if (usersList) usersList.style.display = tab === 'users' ? 'block' : 'none';
                if (chatsList) chatsList.style.display = tab === 'chats' ? 'block' : 'none';
                if (publicList) publicList.style.display = tab === 'public' ? 'block' : 'none';
                
                document.querySelectorAll('.tab').forEach((t, i) => {
                    t.classList.remove('active');
                    if ((tab === 'contacts' && i === 0) || (tab === 'users' && i === 1) || (tab === 'chats' && i === 2) || (tab === 'public' && i === 3)) t.classList.add('active');
                });
                if (tab === 'users') loadAllUsers();
                if (tab === 'chats') loadMyChats();
                if (tab === 'public') loadPublicChannels();
                
                const searchInput = document.getElementById('searchInput');
                if (searchInput) searchInput.value = '';
            };
            
            window.openSettings = function() {
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3><i class="fas fa-cog"></i> Настройки профиля</h3>
                        <input type="text" id="settingsDisplayName" placeholder="Отображаемое имя" value="${escapeHtml(currentUser.display_name || '')}">
                        <textarea id="settingsBio" rows="3" placeholder="О себе">${escapeHtml(currentUser.bio || '')}</textarea>
                        <div class="phone-row">
                            <select id="settingsCountryCode"><option value="+7">+7</option><option value="+1">+1</option><option value="+44">+44</option></select>
                            <input type="tel" id="settingsPhone" placeholder="Номер" value="${currentUser.phone ? currentUser.phone.replace(/^\+?\d+/, '') : ''}">
                        </div>
                        <div class="checkbox-row"><input type="checkbox" id="settingsHidePhone" ${currentUser.hide_phone ? 'checked' : ''}><label><i class="fas fa-eye-slash"></i> Скрыть номер</label></div>
                        <div class="checkbox-row"><input type="checkbox" id="settingsInvisibleMode" ${currentUser.invisible_mode ? 'checked' : ''}><label><i class="fas fa-user-secret"></i> Невидимый режим</label></div>
                        <button class="save-btn" onclick="saveSettings()"><i class="fas fa-save"></i> Сохранить</button>
                        <button class="cancel-btn" onclick="this.closest('.modal').remove()"><i class="fas fa-times"></i> Отмена</button>
                    </div>
                `;
                document.body.appendChild(modal);
            };
            
            window.saveSettings = async function() {
                const displayName = document.getElementById('settingsDisplayName').value.trim();
                const bio = document.getElementById('settingsBio').value.trim();
                const phoneNumber = document.getElementById('settingsPhone').value.trim();
                const hidePhone = document.getElementById('settingsHidePhone').checked;
                const invisibleMode = document.getElementById('settingsInvisibleMode').checked;
                if (!displayName) { alert('Введите имя'); return; }
                const { error } = await supabaseClient.from('users').update({
                    display_name: displayName, bio, hide_phone: hidePhone, invisible_mode: invisibleMode
                }).eq('id', currentUser.id);
                if (error) { alert('Ошибка'); return; }
                currentUser.display_name = displayName; 
                currentUser.bio = bio; 
                currentUser.hide_phone = hidePhone; 
                currentUser.invisible_mode = invisibleMode;
                saveSession(currentUser);
                document.querySelector('.modal')?.remove();
                await loadMainScreen();
                showNotification('Профиль обновлён');
            };
            
            window.startCall = function(contactId, type) { alert(`🔔 ${type === 'audio' ? 'Аудиозвонок' : 'Видеозвонок'} (в разработке)`); };
            
            window.logout = async function() {
                if (currentUser) await supabaseClient.from('users').update({ status: 'offline' }).eq('id', currentUser.id);
                if (autoUpdateInterval) clearInterval(autoUpdateInterval);
                clearSession(); 
                currentUser = null; 
                currentContact = null; 
                currentChat = null;
                isMainScreenLoaded = false;
                showAuth();
            };
            
            function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        })();
    </script>
</body>
</html>
